<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FlowTasks - Gestão de Pedidos</title>
  <!-- Font Awesome 6 (ícones modernos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Chart.js para gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- jsPDF para gerar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
    }

    :root {
      --bg-page: #f4f7fc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --header-bg: #ffffffcc;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --status-aguardando: #f59e0b;
      --status-producao: #8b5cf6;
      --status-retirada: #10b981;
      --status-concluido: #22c55e;
      --urgent-bg: #fee2e2;
      --urgent-border: #ef4444;
      --pagamento-aguardando: #f59e0b;
      --pagamento-pago: #10b981;
      --rota-entrega-bg: #dbeafe;
      --rota-entrega-border: #3b82f6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --concluido-bg: #f0fdf4;
      --concluido-border: #22c55e;
      --receita-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --cliente-bg: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      --rota-bg: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --poscompra-bg: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    }

    body.dark {
      --bg-page: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
      --header-bg: #1e293bcc;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --urgent-bg: #450a0a;
      --urgent-border: #ef4444;
      --pagamento-aguardando: #f59e0b;
      --pagamento-pago: #10b981;
      --rota-entrega-bg: #1e3a5f;
      --rota-entrega-border: #60a5fa;
      --concluido-bg: #064e3b;
      --concluido-border: #22c55e;
      --receita-bg: linear-gradient(135deg, #4c51bf 0%, #5b3a8c 100%);
      --cliente-bg: linear-gradient(135deg, #0d6d64 0%, #2b9e5c 100%);
      --rota-bg: linear-gradient(135deg, #9b4d96 0%, #c4455a 100%);
      --poscompra-bg: linear-gradient(135deg, #b8860b 0%, #cd7a32 100%);
    }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(12px);
      background: var(--header-bg);
      border-radius: 2rem;
      padding: 0.75rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.3rem;
    }

    .logo-area i {
      color: var(--accent);
      font-size: 1.6rem;
    }

    .dn-tarefas {
      background: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .semana-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.6rem 1.4rem;
      font-weight: 600;
      border-radius: 2rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      position: relative;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
    }

    .tab-btn.concluido-btn {
      background: var(--status-concluido);
      color: white;
    }

    .tab-btn.concluido-btn.active {
      background: #16a34a;
      box-shadow: 0 2px 8px rgba(34,197,94,0.3);
    }

    .tab-btn.receita-btn {
      background: var(--receita-bg);
      color: white;
    }

    .tab-btn.receita-btn.active {
      opacity: 0.9;
      box-shadow: 0 2px 8px rgba(102,126,234,0.5);
    }

    .tab-btn.clientes-btn {
      background: var(--cliente-bg);
      color: white;
    }

    .tab-btn.clientes-btn.active {
      opacity: 0.9;
      box-shadow: 0 2px 8px rgba(17,153,142,0.5);
    }

    .tab-btn.rota-btn {
      background: var(--rota-bg);
      color: white;
    }

    .tab-btn.rota-btn.active {
      opacity: 0.9;
      box-shadow: 0 2px 8px rgba(240,147,251,0.5);
    }

    .tab-btn.poscompra-btn {
      background: var(--poscompra-bg);
      color: white;
    }

    .tab-btn.poscompra-btn.active {
      opacity: 0.9;
      box-shadow: 0 2px 8px rgba(246,211,101,0.5);
    }

    .tab-btn.drag-over {
      background: var(--accent);
      opacity: 0.7;
      transform: scale(1.02);
    }

    .view-all-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .actions-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    .search-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 200px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      color: var(--text-primary);
    }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-add:hover { background: var(--accent-hover); }

    .btn-export {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0 1rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-import {
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0 1rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
    }

    .btn-import input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .btn-pdf {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0 1rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .tasks-horizontal {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .week-separator {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: white;
      border-radius: 2rem;
      font-weight: 600;
      display: inline-block;
    }

    .task-card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: all 0.2s;
      cursor: grab;
      position: relative;
    }

    .task-card:active {
      cursor: grabbing;
    }

    .task-card.urgente {
      border-left: 6px solid #ef4444;
      background: var(--urgent-bg);
    }

    .task-card.rota-entrega {
      border-right: 6px solid var(--accent);
      background: var(--rota-entrega-bg);
    }

    .task-card.concluido {
      opacity: 0.85;
      background: var(--concluido-bg);
      border: 1px solid var(--concluido-border);
    }

    .task-number {
      font-weight: 800;
      font-size: 1.4rem;
      background: var(--accent);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      color: white;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .task-number:hover {
      transform: scale(1.05);
      background: var(--accent-hover);
    }

    .task-info {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: baseline;
    }

    .info-chip {
      background: var(--bg-page);
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .urgent-chip {
      background: #ef4444;
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .rota-chip {
      background: var(--accent);
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .payment-status {
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
    }

    .payment-aguardando {
      background: var(--pagamento-aguardando);
      color: white;
    }

    .payment-pago {
      background: var(--pagamento-pago);
      color: white;
    }

    .task-status {
      min-width: 120px;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      text-align: center;
      font-weight: 600;
      background: #e2e8f0;
      color: #1e293b;
      cursor: pointer;
    }

    .status-aguardando { background: #fef3c7; color: #b45309; }
    .status-producao { background: #ede9fe; color: #6d28d9; }
    .status-retirada { background: #d1fae5; color: #047857; }
    .status-concluido { background: #22c55e; color: white; }

    .task-actions {
      display: flex;
      gap: 0.7rem;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 40px;
      transition: 0.1s;
      color: var(--text-secondary);
    }

    .icon-btn:hover { background: var(--border); }

    .whatsapp-btn {
      color: #25D366;
    }

    .urgent-btn {
      color: #ef4444;
    }

    .rota-btn {
      color: var(--accent);
    }

    .concluir-btn {
      color: #22c55e;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 550px;
      border: 1px solid var(--border);
      animation: fadeUp 0.2s;
    }

    .modal-content input, .modal-content select, .modal-content textarea {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.25rem;
      margin-bottom: 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--bg-page);
      color: var(--text-primary);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .checkbox-row input {
      width: auto;
      margin: 0;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 0.8rem;
    }

    .posicao-input-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }

    .posicao-input-group input {
      width: 80px;
      margin-bottom: 0;
      text-align: center;
    }

    .receita-container, .clientes-container, .rota-container, .poscompra-container {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }

    .receita-header, .clientes-header, .rota-header, .poscompra-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .rota-container .rota-lista, .poscompra-lista {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .poscompra-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-page);
      border-radius: 1rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .poscompra-item:hover {
      transform: translateX(5px);
      box-shadow: var(--shadow-md);
    }

    .poscompra-numero {
      width: 50px;
      height: 50px;
      background: var(--poscompra-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.4rem;
      color: white;
      flex-shrink: 0;
    }

    .poscompra-info {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .poscompra-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .rota-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--rota-entrega-bg);
      border-radius: 1rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .rota-item:hover {
      transform: translateX(5px);
      box-shadow: var(--shadow-md);
    }

    .rota-numero {
      width: 50px;
      height: 50px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.4rem;
      color: white;
      flex-shrink: 0;
      cursor: grab;
    }

    .rota-numero:active {
      cursor: grabbing;
    }

    .rota-info {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .rota-info .info-chip {
      background: var(--card-bg);
    }

    .rota-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .move-rota-btn {
      background: var(--accent);
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .move-rota-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .move-rota-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .rota-total, .poscompra-total {
      background: var(--rota-bg);
      padding: 1rem 2rem;
      border-radius: 1rem;
      color: white;
      text-align: center;
    }

    .poscompra-total {
      background: var(--poscompra-bg);
    }

    .rota-actions-header {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .filtros-receita {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .filtro-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: var(--bg-page);
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      border: 1px solid var(--border);
    }

    .btn-filtrar {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    .tipo-receita {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .tipo-receita-btn, .acao-cliente-btn {
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      border: 1px solid var(--border);
      background: var(--bg-page);
      cursor: pointer;
    }

    .tipo-receita-btn.active, .acao-cliente-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .cards-receita {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card-receita {
      background: var(--bg-page);
      border-radius: 1rem;
      padding: 1rem;
      text-align: center;
      border: 1px solid var(--border);
    }

    .card-receita h4 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .card-receita .valor {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }

    .card-receita .valor-projecao {
      color: #f59e0b;
    }

    .card-receita .valor-pago {
      color: #10b981;
    }

    .receita-lista, .clientes-lista {
      max-height: 400px;
      overflow-y: auto;
    }

    .receita-item, .cliente-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .receita-item:hover, .cliente-item:hover {
      background: var(--bg-page);
    }

    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .chart-box {
      background: var(--bg-page);
      border-radius: 1rem;
      padding: 1rem;
    }

    .chart-box h4 {
      text-align: center;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    canvas {
      max-height: 280px;
      max-width: 100%;
    }

    .cliente-recorrente {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
    }

    .frequencia-badge {
      background: #f59e0b;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      margin-left: 0.5rem;
    }

    .sugestao-cliente {
      position: absolute;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1001;
      width: calc(100% - 2rem);
      box-shadow: var(--shadow-md);
    }

    .sugestao-item {
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }

    .sugestao-item:hover {
      background: var(--accent);
      color: white;
    }

    .pdf-options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .pdf-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pdf-option:hover {
      background: var(--bg-page);

<script>
  let tasks = [];
  let historicoReceita = [];
  let clientesCadastrados = [];
  let currentWeek = 1;
  let searchQuery = "";
  let nextId = 100;
  let viewAllMode = false;
  let showingConcluido = false;
  let showingReceita = false;
  let showingClientes = false;
  let showingRota = false;
  let showingPosCompra = false;
  let receitaChart = null;
  let pizzaChart = null;
  let draggedRotaIndex = null;

  function loadData() {
    const stored = localStorage.getItem("flowtasks_app");
    if(stored) {
      tasks = JSON.parse(stored);
      if(tasks.length) {
        const maxId = Math.max(...tasks.map(t => t.id), 0);
        nextId = maxId + 1;
      }
      tasks.forEach(t => { 
        if(t.urgente === undefined) t.urgente = false;
        if(t.dataLancamento === undefined) t.dataLancamento = new Date().toISOString().split('T')[0];
        if(t.pagamento === undefined) t.pagamento = "aguardando";
        if(t.rotaEntrega === undefined) t.rotaEntrega = false;
        if(t.concluido === undefined) t.concluido = false;
        if(t.status === undefined) t.status = "aguardando";
        if(t.rotaOrdem === undefined) t.rotaOrdem = 0;
      });
    } else {
      const hoje = new Date().toISOString().split('T')[0];
      const ontem = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      tasks = [
        { id: 1, semana: 1, nome: "Ana Souza", telefone: "11999991111", descricao: "Manutenção PC", dataEntrega: "2026-06-15", valor: "250,00", status: "aguardando", ordem: 0, urgente: true, dataLancamento: ontem, pagamento: "aguardando", rotaEntrega: false, concluido: false, rotaOrdem: 0 },
        { id: 2, semana: 1, nome: "Carlos Lima", telefone: "21988887777", descricao: "Formatação", dataEntrega: "2026-06-18", valor: "120,00", status: "producao", ordem: 1, urgente: false, dataLancamento: hoje, pagamento: "pago", rotaEntrega: true, concluido: true, rotaOrdem: 0 },
        { id: 3, semana: 2, nome: "Mariana Rocha", telefone: "31977776666", descricao: "Troca de Tela", dataEntrega: "2026-06-22", valor: "450,00", status: "retirada", ordem: 0, urgente: true, dataLancamento: hoje, pagamento: "aguardando", rotaEntrega: false, concluido: false, rotaOrdem: 0 }
      ];
      nextId = 4;
    }
    
    const storedHistorico = localStorage.getItem("flowtasks_historico_receita");
    if(storedHistorico) {
      historicoReceita = JSON.parse(storedHistorico);
    } else {
      historicoReceita = [];
      tasks.forEach(task => {
        if(task.pagamento === "pago") {
          historicoReceita.push({
            id: task.id,
            nome: task.nome,
            valor: task.valor,
            dataPagamento: task.dataLancamento,
            descricao: task.descricao
          });
        }
      });
      saveHistoricoReceita();
    }
    
    const storedClientes = localStorage.getItem("flowtasks_clientes");
    if(storedClientes) {
      clientesCadastrados = JSON.parse(storedClientes);
    } else {
      const clientesMap = new Map();
      tasks.forEach(t => {
        if(!clientesMap.has(t.nome)) {
          clientesMap.set(t.nome, {
            nome: t.nome,
            telefone: t.telefone,
            ultimoPedido: t.dataLancamento,
            totalPedidos: 1,
            totalGasto: converterParaNumero(t.valor)
          });
        } else {
          let c = clientesMap.get(t.nome);
          c.totalPedidos++;
          c.totalGasto += converterParaNumero(t.valor);
        }
      });
      clientesCadastrados = Array.from(clientesMap.values());
      saveClientes();
    }
    
    reorderAllByWeek();
    reordenarPorDataEntrega();
    atualizarOrdemRota();
  }

  function enviarMensagemPosCompra(task) {
    if(!task.telefone || task.telefone.trim() === "") {
      alert("Número de telefone não informado para enviar mensagem.");
      return;
    }
    let numero = task.telefone.replace(/\D/g, '');
    if(numero.length < 10) { alert("Número inválido"); return; }
    
    const msg = `Olá ${task.nome}! 💝%0A%0A*AGRADECEMOS POR FAZER PARTE DA NOSSA HISTÓRIA, COMO CLIENTE!*%0A%0A✨ *MENSAGEM MOTIVACIONAL:* ✨%0A"O sucesso é a soma de pequenos esforços repetidos dia após dia. Cada compra sua é um passo importante na nossa jornada. Continue acreditando em você e nos permitindo fazer parte da sua história!"%0A%0A🙏 Muito obrigado pela confiança e preferência!%0A🌟 Conte sempre conosco.%0A%0A*Equipe FlowTasks* 🚀`;
    
    window.open(`https://wa.me/55${numero}?text=${msg}`, '_blank');
  }

  function atualizarOrdemRota() {
    let pedidosRota = tasks.filter(t => t.rotaEntrega === true && !t.concluido);
    pedidosRota.sort((a,b) => (a.rotaOrdem || 0) - (b.rotaOrdem || 0));
    pedidosRota.forEach((t, idx) => {
      t.rotaOrdem = idx;
    });
    saveToLocal();
  }

  function moverOrdemRota(taskId, direction) {
    let pedidosRota = tasks.filter(t => t.rotaEntrega === true && !t.concluido);
    pedidosRota.sort((a,b) => (a.rotaOrdem || 0) - (b.rotaOrdem || 0));
    const currentIndex = pedidosRota.findIndex(t => t.id === taskId);
    
    if(direction === 'up' && currentIndex > 0) {
      const tempOrdem = pedidosRota[currentIndex].rotaOrdem;
      pedidosRota[currentIndex].rotaOrdem = pedidosRota[currentIndex - 1].rotaOrdem;
      pedidosRota[currentIndex - 1].rotaOrdem = tempOrdem;
    } else if(direction === 'down' && currentIndex < pedidosRota.length - 1) {
      const tempOrdem = pedidosRota[currentIndex].rotaOrdem;
      pedidosRota[currentIndex].rotaOrdem = pedidosRota[currentIndex + 1].rotaOrdem;
      pedidosRota[currentIndex + 1].rotaOrdem = tempOrdem;
    }
    
    pedidosRota.sort((a,b) => (a.rotaOrdem || 0) - (b.rotaOrdem || 0));
    pedidosRota.forEach((t, idx) => {
      t.rotaOrdem = idx;
    });
    
    saveToLocal();
    if(showingRota) renderRota();
  }

  function gerarPDFRota() {
    let pedidosRota = tasks.filter(t => t.rotaEntrega === true && !t.concluido);
    pedidosRota.sort((a,b) => (a.rotaOrdem || 0) - (b.rotaOrdem || 0));
    
    if(pedidosRota.length === 0) {
      alert("Nenhum pedido na rota de entrega para gerar PDF!");
      return;
    }
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    const hoje = new Date();
    const dataAtual = hoje.toLocaleDateString('pt-BR');
    
    doc.setFontSize(20);
    doc.text("🚚 ROTA DE ENTREGA", 105, y, { align: 'center' });
    y += 10;
    doc.setFontSize(12);
    doc.text(`Data: ${dataAtual}`, 105, y, { align: 'center' });
    y += 15;
    
    doc.setFontSize(14);
    doc.text(`Total de entregas: ${pedidosRota.length}`, 20, y);
    y += 10;
    
    doc.setFontSize(12);
    doc.text("─".repeat(50), 20, y);
    y += 8;
    
    doc.setFontSize(11);
    for(let i = 0; i < pedidosRota.length; i++) {
      const p = pedidosRota[i];
      if(y > 270) {
        doc.addPage();
        y = 20;
      }
      
      const statusPagamento = p.pagamento === "pago" ? "✅ PAGO" : "⏳ PENDENTE";
      doc.text(`${i+1}. ${p.nome}`, 20, y);
      doc.text(`${statusPagamento}`, 140, y);
      y += 7;
    }
    
    doc.save(`rota_entrega_${dataAtual.replace(/\//g, '_')}.pdf`);
  }

  function reordenarPorDataEntrega() {
    for(let w = 1; w <= 3; w++) {
      let weekTasks = tasks.filter(t => t.semana === w && !t.concluido);
      let urgentes = weekTasks.filter(t => t.urgente);
      let normais = weekTasks.filter(t => !t.urgente);
      
      normais.sort((a, b) => {
        const dataA = a.dataEntrega ? new Date(a.dataEntrega) : new Date('2099-12-31');
        const dataB = b.dataEntrega ? new Date(b.dataEntrega) : new Date('2099-12-31');
        return dataA - dataB;
      });
      
      urgentes.sort((a, b) => {
        const dataA = a.dataEntrega ? new Date(a.dataEntrega) : new Date('2099-12-31');
        const dataB = b.dataEntrega ? new Date(b.dataEntrega) : new Date('2099-12-31');
        return dataA - dataB;
      });
      
      const todos = [...urgentes, ...normais];
      todos.forEach((t, idx) => { t.ordem = idx; });
    }
    saveToLocal();
  }

  function saveClientes() {
    localStorage.setItem("flowtasks_clientes", JSON.stringify(clientesCadastrados));
  }

  function buscarClientePorNome(nome) {
    return clientesCadastrados.find(c => c.nome.toLowerCase() === nome.toLowerCase());
  }

  function showSugestoes(input) {
    const sugestoesDiv = document.getElementById("sugestoesClientes");
    const valor = input.value.toLowerCase();
    
    if(!valor || valor.length < 1) {
      sugestoesDiv.style.display = "none";
      return;
    }
    
    const sugestoes = clientesCadastrados.filter(c => 
      c.nome.toLowerCase().includes(valor)
    ).slice(0, 5);
    
    if(sugestoes.length === 0) {
      sugestoesDiv.style.display = "none";
      return;
    }
    
    sugestoesDiv.innerHTML = sugestoes.map(c => 
      `<div class="sugestao-item" data-nome="${escapeHtml(c.nome)}" data-telefone="${escapeHtml(c.telefone || '')}">
        <strong>${escapeHtml(c.nome)}</strong>
        ${c.telefone ? `<br><small>${escapeHtml(c.telefone)}</small>` : ''}
        <small style="color: #f59e0b;"> (${c.totalPedidos} pedidos)</small>
      </div>`
    ).join("");
    
    sugestoesDiv.style.display = "block";
    
    sugestoesDiv.querySelectorAll(".sugestao-item").forEach(el => {
      el.addEventListener("click", () => {
        const nome = el.dataset.nome;
        const telefone = el.dataset.telefone;
        input.value = nome;
        document.getElementById("telefone").value = telefone;
        sugestoesDiv.style.display = "none";
      });
    });
  }

  function atualizarOuAdicionarCliente(nome, telefone, dataPedido, valor) {
    const existing = clientesCadastrados.find(c => c.nome === nome);
    if(existing) {
      existing.telefone = telefone || existing.telefone;
      existing.ultimoPedido = dataPedido;
      existing.totalPedidos++;
      existing.totalGasto += converterParaNumero(valor);
    } else {
      clientesCadastrados.push({
        nome: nome,
        telefone: telefone,
        ultimoPedido: dataPedido,
        totalPedidos: 1,
        totalGasto: converterParaNumero(valor)
      });
    }
    saveClientes();
  }

  function removerPedidoDoCliente(nome, valor) {
    const cliente = clientesCadastrados.find(c => c.nome === nome);
    if(cliente) {
      cliente.totalPedidos--;
      cliente.totalGasto -= converterParaNumero(valor);
      if(cliente.totalPedidos <= 0) {
        const index = clientesCadastrados.findIndex(c => c.nome === nome);
        if(index !== -1) clientesCadastrados.splice(index, 1);
      }
      saveClientes();
    }
  }

  function saveHistoricoReceita() {
    localStorage.setItem("flowtasks_historico_receita", JSON.stringify(historicoReceita));
  }

  function registrarReceita(task) {
    const existe = historicoReceita.some(h => h.id === task.id);
    if(!existe && task.pagamento === "pago") {
      historicoReceita.push({
        id: task.id,
        nome: task.nome,
        valor: task.valor,
        dataPagamento: task.dataLancamento,
        descricao: task.descricao
      });
      saveHistoricoReceita();
    }
  }

  function removerReceita(taskId) {
    historicoReceita = historicoReceita.filter(h => h.id !== taskId);
    saveHistoricoReceita();
  }

  function reorderAllByWeek() {
    reordenarPorDataEntrega();
  }

  function saveToLocal() {
    localStorage.setItem("flowtasks_app", JSON.stringify(tasks));
  }

  function moveTaskToWeek(taskId, targetWeek) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.semana === targetWeek || task.concluido) return;
    task.semana = targetWeek;
    reordenarPorDataEntrega();
    saveToLocal();
    renderTasks();
  }

  function moveTask(taskId, direction) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.concluido) return;
    
    let weekTasks = tasks.filter(t => t.semana === task.semana && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    const currentIndex = weekTasks.findIndex(t => t.id === taskId);
    
    if(direction === 'up' && currentIndex > 0) {
      const tempOrdem = weekTasks[currentIndex].ordem;
      weekTasks[currentIndex].ordem = weekTasks[currentIndex - 1].ordem;
      weekTasks[currentIndex - 1].ordem = tempOrdem;
    } else if(direction === 'down' && currentIndex < weekTasks.length - 1) {
      const tempOrdem = weekTasks[currentIndex].ordem;
      weekTasks[currentIndex].ordem = weekTasks[currentIndex + 1].ordem;
      weekTasks[currentIndex + 1].ordem = tempOrdem;
    }
    
    weekTasks.sort((a,b) => (a.ordem||0) - (b.ordem||0));
    weekTasks.forEach((t, idx) => { t.ordem = idx; });
    
    saveToLocal();
    renderTasks();
  }

  function ajustarPosicao(taskId, novaPosicao) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.concluido) return false;
    
    let weekTasks = tasks.filter(t => t.semana === task.semana && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    
    if(novaPosicao < 1 || novaPosicao > weekTasks.length) {
      alert(`Posição inválida! Escolha entre 1 e ${weekTasks.length}`);
      return false;
    }
    
    const currentIndex = weekTasks.findIndex(t => t.id === taskId);
    const targetIndex = novaPosicao - 1;
    
    if(currentIndex === targetIndex) return false;
    
    weekTasks.splice(currentIndex, 1);
    weekTasks.splice(targetIndex, 0, task);
    
    weekTasks.forEach((t, idx) => { t.ordem = idx; });
    
    saveToLocal();
    renderTasks();
    return true;
  }
  
  function toggleUrgent(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido) {
      task.urgente = !task.urgente;
      reordenarPorDataEntrega();
      saveToLocal();
      renderTasks();
    }
  }

  function toggleRotaEntrega(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido) {
      task.rotaEntrega = !task.rotaEntrega;
      if(task.rotaEntrega) {
        atualizarOrdemRota();
      }
      saveToLocal();
      renderTasks();
      if(showingRota) renderRota();
    }
  }

  function togglePagamento(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task) {
      const eraPago = task.pagamento === "pago";
      task.pagamento = task.pagamento === "aguardando" ? "pago" : "aguardando";
      
      if(task.pagamento === "pago" && !eraPago) {
        registrarReceita(task);
      } else if(task.pagamento === "aguardando" && eraPago) {
        removerReceita(task.id);
      }
      
      saveToLocal();
      renderTasks();
      if(showingReceita) renderReceita();
      if(showingRota) renderRota();
    }
  }

  function marcarConcluido(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido) {
      task.concluido = true;
      task.dataConclusao = new Date().toISOString().split('T')[0];
      saveToLocal();
      renderTasks();
      if(showingRota) renderRota();
    }
  }

  function addTask(task) {
    task.id = nextId++;
    task.dataLancamento = new Date().toISOString().split('T')[0];
    if(!task.pagamento) task.pagamento = "aguardando";
    if(task.rotaEntrega === undefined) task.rotaEntrega = false;
    if(task.concluido === undefined) task.concluido = false;
    if(task.rotaOrdem === undefined) task.rotaOrdem = 0;
    tasks.push(task);
    
    atualizarOuAdicionarCliente(task.nome, task.telefone, task.dataLancamento, task.valor);
    
    if(task.pagamento === "pago") {
      registrarReceita(task);
    }
    
    if(task.rotaEntrega) {
      atualizarOrdemRota();
    }
    
    reordenarPorDataEntrega();
    renderTasks();
  }
  
  function updateTask(updated) {
    const index = tasks.findIndex(t => t.id === updated.id);
    if(index !== -1) {
      const oldTask = tasks[index];
      const eraPago = oldTask.pagamento === "pago";
      
      if(oldTask.nome !== updated.nome) {
        removerPedidoDoCliente(oldTask.nome, oldTask.valor);
        atualizarOuAdicionarCliente(updated.nome, updated.telefone, updated.dataLancamento, updated.valor);
      } else {
        const cliente = clientesCadastrados.find(c => c.nome === updated.nome);
        if(cliente) {
          cliente.telefone = updated.telefone || cliente.telefone;
          saveClientes();
        }
      }
      
      updated.dataLancamento = oldTask.dataLancamento;
      updated.concluido = oldTask.concluido;
      updated.dataConclusao = oldTask.dataConclusao;
      tasks[index] = updated;
      
      if(updated.pagamento === "pago" && !eraPago) {
        registrarReceita(updated);
      } else if(updated.pagamento === "aguardando" && eraPago) {
        removerReceita(updated.id);
      }
      
      if(updated.rotaEntrega && !oldTask.rotaEntrega) {
        atualizarOrdemRota();
      }
      
      reordenarPorDataEntrega();
      renderTasks();
      if(showingReceita) renderReceita();
      if(showingClientes) renderClientes();
      if(showingRota) renderRota();
    }
  }
  
  function deleteTask(id) {
    const task = tasks.find(t => t.id === id);
    if(task) {
      removerPedidoDoCliente(task.nome, task.valor);
      if(task.pagamento === "pago") {
        removerReceita(id);
      }
    }
    tasks = tasks.filter(t => t.id !== id);
    reordenarPorDataEntrega();
    atualizarOrdemRota();
    renderTasks();
    if(showingReceita) renderReceita();
    if(showingClientes) renderClientes();
    if(showingRota) renderRota();
  }

    let numero = task.telefone.replace(/\D/g, '');

    const pagamentoText = task.pagamento === "pago" ? "✅ *PAGO*" : "⏳ *Aguardando Pagamento*";
    
    let msg;
    
    if(task.concluido) {
      msg = `Olá ${task.nome}, seu pedido *${task.descricao}* foi *CONCLUÍDO* com sucesso! ✅%0A💰 Valor: R$ ${task.valor}%0A💵 Status de pagamento: ${pagamentoText}%0A🎉 Agradecemos pela preferência!`;
    } else if(task.rotaEntrega) {
      msg = `Olá ${task.nome}, seu pedido *${task.descricao}* está em rota de entrega! 🚚%0A💰 Valor: R$ ${task.valor}%0A💵 Status de pagamento: ${pagamentoText}%0A✅ Seu pedido será entregue hoje! Agradecemos a preferência.`;

  function cycleStatus(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.concluido) return;
    const statusOrder = ['aguardando', 'producao', 'retirada'];

    let newIdx = (idx+1) % statusOrder.length;
    task.status = statusOrder[newIdx];

    renderTasks();

  function formatDate(dateStr) {
    if(!dateStr) return '—';
    const partes = dateStr.split('-');
    if(partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
    return dateStr;
  }

  function formatarValor(valor) {
    if(!valor) return "0,00";
    let v = valor.toString().replace(/[^\d,.-]/g, '');
    if(v.includes(',')) {
      v = v.replace(/\./g, '');
    } else if(v.includes('.')) {
      let partes = v.split('.');
      if(partes.length === 2) {
        v = partes[0] + ',' + partes[1].padEnd(2, '0').slice(0,2);
      }
    }
    return v;
  }

  function converterParaNumero(valorStr) {
    if(!valorStr) return 0;
    let v = valorStr.toString().replace(/\./g, '').replace(',', '.');
    let num = parseFloat(v);
    return isNaN(num) ? 0 : num;
  }

  function exportToCSV() {
    const data = tasks.map(t => ({
      ID: t.id,
      Nome: t.nome,
      Telefone: t.telefone,
      Descricao: t.descricao,
      "Data Entrega": t.dataEntrega,
      Valor: t.valor,
      Status: t.status,
      Pagamento: t.pagamento,
      Urgente: t.urgente ? "Sim" : "Não",
      "Rota Entrega": t.rotaEntrega ? "Sim" : "Não",
      Concluido: t.concluido ? "Sim" : "Não",
      Semana: t.semana,
      "Data Lançamento": t.dataLancamento
    }));
    
    const headers = Object.keys(data[0] || {});
    const csvRows = [];
    csvRows.push(headers.join(','));
    
    for (const row of data) {
      const values = headers.map(header => {
        const val = row[header] || '';
        return `"${String(val).replace(/"/g, '""')}"`;
      });
      csvRows.push(values.join(','));
    }
    
    const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute('download', `pedidos_${new Date().toISOString().split('T')[0]}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function importFromCSV(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      const rows = text.split('\n');
      const headers = rows[0].split(',').map(h => h.replace(/"/g, '').trim());
      
      const novosPedidos = [];
      for(let i = 1; i < rows.length; i++) {
        if(!rows[i].trim()) continue;
        const values = [];
        let inQuote = false;
        let currentValue = '';
        for(let char of rows[i]) {
          if(char === '"') {
            inQuote = !inQuote;
          } else if(char === ',' && !inQuote) {
            values.push(currentValue.trim());
            currentValue = '';
          } else {
            currentValue += char;
          }
        }
        values.push(currentValue.trim());
        
        const pedido = {};
        headers.forEach((header, idx) => {
          let val = values[idx] || '';
          val = val.replace(/^"|"$/g, '');
          pedido[header] = val;
        });
        
        if(pedido.Nome) {
          novosPedidos.push({
            id: nextId++,
            nome: pedido.Nome,
            telefone: pedido.Telefone || "",
            descricao: pedido.Descricao || "",
            dataEntrega: pedido["Data Entrega"] || "",
            valor: pedido.Valor || "0",
            status: pedido.Status || "aguardando",
            pagamento: pedido.Pagamento || "aguardando",
            urgente: pedido.Urgente === "Sim",
            rotaEntrega: pedido["Rota Entrega"] === "Sim",
            concluido: pedido.Concluido === "Sim",
            semana: parseInt(pedido.Semana) || 1,
            dataLancamento: pedido["Data Lançamento"] || new Date().toISOString().split('T')[0],
            ordem: 0,
            rotaOrdem: 0
          });
        }
      }
      
      if(novosPedidos.length > 0) {
        novosPedidos.forEach(p => {
          tasks.push(p);
          atualizarOuAdicionarCliente(p.nome, p.telefone, p.dataLancamento, p.valor);
          if(p.pagamento === "pago") registrarReceita(p);
        });
        atualizarOrdemRota();
        reordenarPorDataEntrega();
        renderTasks();
        alert(`${novosPedidos.length} pedidos importados com sucesso!`);
      } else {
        alert("Nenhum pedido válido encontrado no arquivo CSV");
      }
    };
    reader.readAsText(file);
  }

    let y = 20;
    
    if(tipo === 'mensal') {
      const nomeMes = new Date(ano, mes-1, 1).toLocaleString('pt-BR', { month: 'long' });
      doc.setFontSize(20);
      doc.text(`Relatório Mensal - ${nomeMes}/${ano}`, 105, y, { align: 'center' });
      y += 15;
      
      const inicio = new Date(ano, mes-1, 1);
      const fim = new Date(ano, mes, 0);
      
      const pedidosFiltrados = tasks.filter(t => {
        const data = new Date(t.dataLancamento);
        return data >= inicio && data <= fim;
      });
      
      const totalPedidos = pedidosFiltrados.length;
      const totalPagos = pedidosFiltrados.filter(t => t.pagamento === "pago").length;
      const totalValor = pedidosFiltrados.reduce((sum, t) => sum + converterParaNumero(t.valor), 0);
      const totalPago = pedidosFiltrados.filter(t => t.pagamento === "pago").reduce((sum, t) => sum + converterParaNumero(t.valor), 0);
      
      doc.setFontSize(12);
      doc.text(`Período: ${formatDate(inicio.toISOString().split('T')[0])} a ${formatDate(fim.toISOString().split('T')[0])}`, 20, y);
      y += 10;
      doc.text(`Total de Pedidos: ${totalPedidos}`, 20, y);
      y += 7;
      doc.text(`Pedidos Pagos: ${totalPagos}`, 20, y);
      y += 7;
      doc.text(`Valor Total: R$ ${totalValor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 20, y);
      y += 7;
      doc.text(`Valor Recebido: R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 20, y);
      y += 15;
      
      doc.setFontSize(14);
      doc.text("Lista de Pedidos:", 20, y);
      y += 10;
      doc.setFontSize(10);
      
      pedidosFiltrados.forEach((p, idx) => {
        if(y > 270) {
          doc.addPage();
          y = 20;
        }
        doc.text(`${idx + 1}. ${p.nome} - R$ ${formatarValor(p.valor)} - ${p.pagamento === "pago" ? "PAGO" : "PENDENTE"}`, 20, y);
        y += 6;
      });
      
      doc.save(`relatorio_${nomeMes}_${ano}.pdf`);
      
    } else if(tipo === 'anual') {
      doc.setFontSize(20);
      doc.text(`Relatório Anual - ${ano}`, 105, y, { align: 'center' });
      y += 15;
      
      const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
      let totalGeral = 0;
      let totalPagosGeral = 0;
      const mesesComMovimento = [];
      
      for(let i = 0; i < meses.length; i++) {
        const inicio = new Date(ano, i, 1);
        const fim = new Date(ano, i + 1, 0);
        
        const pedidosMes = tasks.filter(t => {
          const data = new Date(t.dataLancamento);
          return data >= inicio && data <= fim;
        });
        
        const totalVendas = pedidosMes.reduce((sum, t) => sum + converterParaNumero(t.valor), 0);
        const totalPagos = pedidosMes.filter(t => t.pagamento === "pago").reduce((sum, t) => sum + converterParaNumero(t.valor), 0);
        
        if(totalVendas > 0 || pedidosMes.length > 0) {
          mesesComMovimento.push({
            nome: meses[i],
            totalVendas,
            totalPagos,
            qtdPedidos: pedidosMes.length
          });
          totalGeral += totalVendas;
          totalPagosGeral += totalPagos;
        }
      }
      
      if(mesesComMovimento.length === 0) {
        doc.text("Nenhum movimento registrado neste ano.", 20, y);
        doc.save(`relatorio_anual_${ano}.pdf`);
        return;
      }
      
      doc.setFontSize(12);
      doc.text("Resumo Mensal (apenas meses com movimento):", 20, y);
      y += 10;
      doc.setFontSize(10);
      
      for(const mes of mesesComMovimento) {
        if(y > 270) {
          doc.addPage();
          y = 20;
        }
        doc.text(`${mes.nome}: ${mes.qtdPedidos} pedido(s) - R$ ${mes.totalVendas.toLocaleString('pt-BR', {minimumFractionDigits: 2})} (Recebido: R$ ${mes.totalPagos.toLocaleString('pt-BR', {minimumFractionDigits: 2})})`, 20, y);
        y += 6;
      }
      
      y += 10;
      doc.setFontSize(12);
      doc.text(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 20, y);
      y += 7;
      doc.setFontSize(14);
      doc.text(`📊 TOTAL DO ANO ${ano}: R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 20, y);
      y += 7;
      doc.text(`💰 TOTAL RECEBIDO: R$ ${totalPagosGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 20, y);
      
      doc.save(`relatorio_anual_${ano}.pdf`);
      
    } else if(tipo === 'periodo') {
      doc.setFontSize(20);
      doc.text(`Relatório Personalizado`, 105, y, { align: 'center' });
      y += 15;
      
      const dataInicioObj = new Date(dataInicio);
      const dataFimObj = new Date(dataFim);
      
      const pedidosFiltrados = tasks.filter(t => {
        const data = new Date(t.dataLancamento);
        return data >= dataInicioObj && data <= dataFimObj;
      });
      
      const totalPedidos = pedidosFiltrados.length;
      const totalPagos = pedidosFiltrados.filter(t => t.pagamento === "pago").length;
      const totalValor = pedidosFiltrados.reduce((sum, t) => sum + converterParaNumero(t.valor), 0);
      const totalPago = pedidosFiltrados.filter(t => t.pagamento === "pago").reduce((sum, t) => sum + converterParaNumero(t.valor), 0);
      
      doc.setFontSize(12);
      doc.text(`Período: ${formatDate(dataInicio)} a ${formatDate(dataFim)}`, 20, y);
      y += 10;
      doc.text(`Total de Pedidos: ${totalPedidos}`, 20, y);
      y += 7;
      doc.text(`Pedidos Pagos: ${totalPagos}`, 20, y);
      y += 7;
      doc.text(`Valor Total: R$ ${totalValor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 20, y);
      y += 7;
      doc.text(`Valor Recebido: R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 20, y);
      y += 15;
      
      doc.setFontSize(14);
      doc.text("Lista de Pedidos:", 20, y);
      y += 10;
      doc.setFontSize(10);
      
      pedidosFiltrados.forEach((p, idx) => {
        if(y > 270) {
          doc.addPage();
          y = 20;
        }
        doc.text(`${idx + 1}. ${p.nome} - R$ ${formatarValor(p.valor)} - ${p.pagamento === "pago" ? "PAGO" : "PENDENTE"}`, 20, y);
        y += 6;
      });
      
      doc.save(`relatorio_${dataInicio}_a_${dataFim}.pdf`);
    }
  }

  function abrirModalPDF() {
    const pdfModal = document.getElementById("pdfModal");
    pdfModal.style.display = "flex";
    
    const radioMensal = document.getElementById("pdfMensal");
    const radioAnual = document.getElementById("pdfAnual");
    const radioPeriodo = document.getElementById("pdfPeriodo");
    const periodoInputs = document.getElementById("periodoInputs");
    const anoSelect = document.getElementById("anoSelect");
    const mesSelect = document.getElementById("mesSelect");
    
    function atualizarVisibilidade() {
      if(radioMensal.checked) {
        periodoInputs.style.display = "none";
        anoSelect.style.display = "flex";
        mesSelect.style.display = "flex";
      } else if(radioAnual.checked) {
        periodoInputs.style.display = "none";
        anoSelect.style.display = "flex";
        mesSelect.style.display = "none";
      } else {
        periodoInputs.style.display = "flex";
        anoSelect.style.display = "none";
        mesSelect.style.display = "none";
      }
    }
    
    radioMensal.addEventListener("change", atualizarVisibilidade);
    radioAnual.addEventListener("change", atualizarVisibilidade);
    radioPeriodo.addEventListener("change", atualizarVisibilidade);
    
    const hoje = new Date();
    document.getElementById("pdfAnoSelect").value = hoje.getFullYear();
    document.getElementById("pdfMesSelect").value = hoje.getMonth() + 1;
    document.getElementById("pdfDataInicio").value = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
    document.getElementById("pdfDataFim").value = hoje.toISOString().split('T')[0];
    
    atualizarVisibilidade();
  }

  function renderReceita() {
    const dataInicio = document.getElementById("dataInicio")?.value;
    const dataFim = document.getElementById("dataFim")?.value;
    const tipoFiltro = document.getElementById("tipoFiltro")?.value;
    
    let projecaoFiltrada = [];
    let pagosFiltrados = [];
    
    projecaoFiltrada = tasks.filter(t => !t.concluido).map(t => ({
      id: t.id,
      nome: t.nome,
      valor: converterParaNumero(t.valor),
      dataPagamento: t.dataEntrega || t.dataLancamento,
      descricao: t.descricao,
      status_pagamento: t.pagamento
    }));
    
    const concluidosNaoPagos = tasks.filter(t => t.concluido && t.pagamento === "aguardando");
    concluidosNaoPagos.forEach(t => {
      projecaoFiltrada.push({
        id: t.id,
        nome: t.nome,
        valor: converterParaNumero(t.valor),
        dataPagamento: t.dataConclusao || t.dataLancamento,
        descricao: t.descricao,
        status_pagamento: t.pagamento
      });
    });
    
    pagosFiltrados = [...historicoReceita].map(r => ({
      ...r,
      valor: converterParaNumero(r.valor)
    }));
    
    if(dataInicio && dataFim) {
      const inicio = new Date(dataInicio);
      const fim = new Date(dataFim);
      fim.setHours(23, 59, 59);
      projecaoFiltrada = projecaoFiltrada.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicio && data <= fim;
      });
      pagosFiltrados = pagosFiltrados.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicio && data <= fim;
      });
    } else if(tipoFiltro === "semana") {
      const hoje = new Date();
      const inicioSemana = new Date(hoje);
      inicioSemana.setDate(hoje.getDate() - hoje.getDay());
      const fimSemana = new Date(hoje);
      fimSemana.setDate(hoje.getDate() + (6 - hoje.getDay()));
      projecaoFiltrada = projecaoFiltrada.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioSemana && data <= fimSemana;
      });
      pagosFiltrados = pagosFiltrados.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioSemana && data <= fimSemana;
      });
    } else if(tipoFiltro === "mes") {
      const hoje = new Date();
      const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
      const fimMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
      projecaoFiltrada = projecaoFiltrada.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioMes && data <= fimMes;
      });
      pagosFiltrados = pagosFiltrados.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioMes && data <= fimMes;
      });
    } else if(tipoFiltro === "ano") {
      const hoje = new Date();
      const inicioAno = new Date(hoje.getFullYear(), 0, 1);
      const fimAno = new Date(hoje.getFullYear(), 11, 31);
      projecaoFiltrada = projecaoFiltrada.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioAno && data <= fimAno;
      });
      pagosFiltrados = pagosFiltrados.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioAno && data <= fimAno;
      });
    }
    
    const totalProjecao = projecaoFiltrada.reduce((sum, r) => sum + r.valor, 0);
    const totalPago = pagosFiltrados.reduce((sum, r) => sum + r.valor, 0);
    const totalGeral = totalProjecao;
    
    const mesesProjecao = {};
    projecaoFiltrada.forEach(r => {
      const data = new Date(r.dataPagamento);
      const mesAno = `${data.getMonth()+1}/${data.getFullYear()}`;
      mesesProjecao[mesAno] = (mesesProjecao[mesAno] || 0) + r.valor;
    });
    
    const mesesPagos = {};
    pagosFiltrados.forEach(r => {
      const data = new Date(r.dataPagamento);
      const mesAno = `${data.getMonth()+1}/${data.getFullYear()}`;
      mesesPagos[mesAno] = (mesesPagos[mesAno] || 0) + r.valor;
    });
    
    const html = `
      <div class="receita-container">
        <div class="receita-header">
          <div class="cards-receita">
            <div class="card-receita">
              <h4><i class="fas fa-chart-line"></i> PROJEÇÃO TOTAL</h4>
              <div class="valor valor-projecao">R$ ${totalProjecao.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
              <small>Valor previsto para receber</small>
            </div>
            <div class="card-receita">
              <h4><i class="fas fa-check-circle"></i> TOTAL RECEBIDO</h4>
              <div class="valor valor-pago">R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
              <small>Valor já recebido</small>
            </div>
            <div class="card-receita">
              <h4><i class="fas fa-chart-pie"></i> FATURAMENTO TOTAL</h4>
              <div class="valor">R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
              <small>Valor total dos pedidos</small>
            </div>
          </div>
        </div>
        
        <div class="filtros-receita">
          <div class="filtro-group">
            <label>Período:</label>
            <select id="tipoFiltro">
              <option value="todos">Todos</option>
              <option value="semana">Esta Semana</option>
              <option value="mes">Este Mês</option>
              <option value="ano">Este Ano</option>
              <option value="personalizado">Personalizado</option>
            </select>
          </div>
          <div class="filtro-group" id="periodoPersonalizado" style="display: none;">
            <label>De:</label>
            <input type="date" id="dataInicio">
            <label>Até:</label>
            <input type="date" id="dataFim">
          </div>
          <button class="btn-filtrar" onclick="window.aplicarFiltroReceita()">Filtrar</button>
        </div>
        
        <div class="chart-row">
          <div class="chart-box">
            <h4><i class="fas fa-chart-pie"></i> Projeção vs Recebido</h4>
            <canvas id="pizzaChart"></canvas>
          </div>
          <div class="chart-box">
            <h4><i class="fas fa-chart-bar"></i> Evolução Mensal</h4>
            <canvas id="receitaChart"></canvas>
          </div>
        </div>
        
        <h3 style="margin: 1rem 0 0.5rem 0;"><i class="fas fa-history"></i> Histórico de Receitas (Pagos)</h3>
        <div class="receita-lista">
          ${pagosFiltrados.length === 0 ? '<div style="text-align:center; padding:2rem;">Nenhuma receita encontrada</div>' : 
            pagosFiltrados.map(r => `
              <div class="receita-item">
                <div>
                  <strong>${escapeHtml(r.nome)}</strong><br>
                  <small>${escapeHtml(r.descricao?.substring(0, 30) || '')}</small>
                </div>
                <div>
                  <span style="color: #10b981; font-weight: bold;">R$ ${r.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span><br>
                  <small>${formatDate(r.dataPagamento)}</small>
                </div>
              </div>
            `).join('')
          }
        </div>
        
        <h3 style="margin: 1rem 0 0.5rem 0;"><i class="fas fa-clock"></i> Projeção de Recebimento (Pendentes)</h3>
        <div class="receita-lista">
          ${projecaoFiltrada.filter(r => r.status_pagamento !== "pago").length === 0 ? '<div style="text-align:center; padding:2rem;">Nenhum pedido pendente</div>' : 
            projecaoFiltrada.filter(r => r.status_pagamento !== "pago").map(r => `
              <div class="receita-item">
                <div>
                  <strong>${escapeHtml(r.nome)}</strong><br>
                  <small>${escapeHtml(r.descricao?.substring(0, 30) || '')}</small>
                </div>
                <div>
                  <span style="color: #f59e0b; font-weight: bold;">R$ ${r.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span><br>
                  <small>${formatDate(r.dataPagamento)}</small>
                </div>
              </div>
            `).join('')
          }
        </div>
      </div>
    `;
    
    const receitaContainer = document.getElementById("receitaContainer");
    if(receitaContainer) {
      receitaContainer.innerHTML = html;
      
      const tipoFiltroSelect = document.getElementById("tipoFiltro");
      const periodoPersonalizado = document.getElementById("periodoPersonalizado");
      if(tipoFiltroSelect) {
        tipoFiltroSelect.addEventListener("change", (e) => {
          periodoPersonalizado.style.display = e.target.value === "personalizado" ? "flex" : "none";
        });
      }
      
      const pizzaCtx = document.getElementById('pizzaChart')?.getContext('2d');
      if(pizzaCtx && pizzaChart) {
        pizzaChart.destroy();
      }
      if(pizzaCtx) {
        pizzaChart = new Chart(pizzaCtx, {
          type: 'pie',
          data: {
            labels: [`Recebido (R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})})`, `A Receber (R$ ${(totalProjecao - totalPago).toLocaleString('pt-BR', {minimumFractionDigits: 2})})`],
            datasets: [{
              data: [totalPago, Math.max(0, totalProjecao - totalPago)],
              backgroundColor: ['#10b981', '#f59e0b'],
              borderColor: ['#059669', '#d97706'],
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { position: 'bottom' },
              tooltip: { callbacks: { label: (ctx) => `${ctx.label}: R$ ${ctx.raw.toLocaleString('pt-BR', {minimumFractionDigits: 2})} (${((ctx.raw / totalProjecao) * 100).toFixed(1)}%)` } }
            }
          }
        });
      }
      
      const barCtx = document.getElementById('receitaChart')?.getContext('2d');
      if(barCtx && receitaChart) {
        receitaChart.destroy();
      }
      if(barCtx) {
        const labels = Array.from(new Set([...Object.keys(mesesProjecao), ...Object.keys(mesesPagos)])).sort();
        const dadosProjecao = labels.map(l => mesesProjecao[l] || 0);
        const dadosPagos = labels.map(l => mesesPagos[l] || 0);
        
        receitaChart = new Chart(barCtx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'Projeção (R$)',
                data: dadosProjecao,
                backgroundColor: 'rgba(245, 158, 11, 0.6)',
                borderColor: 'rgba(245, 158, 11, 1)',
                borderWidth: 1
              },
              {
                label: 'Recebido (R$)',
                data: dadosPagos,
                backgroundColor: 'rgba(16, 185, 129, 0.6)',
                borderColor: 'rgba(16, 185, 129, 1)',
                borderWidth: 1
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { position: 'top' },
              tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: R$ ${ctx.raw.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` } }
            },
            scales: { y: { ticks: { callback: (v) => `R$ ${v.toLocaleString('pt-BR')}` } } }
          }
        });
      }
    }
  }

  function renderTasks() {
    let filtered = [];
    
    if(showingRota) {
      renderRota();
      return;
    } else if(showingPosCompra) {
      renderPosCompra();
      return;
    } else if(showingReceita) {
      renderReceita();
      return;
    } else if(showingClientes) {
      renderClientes();
      return;
    } else if(showingConcluido) {
      filtered = tasks.filter(t => t.concluido === true);
      filtered.sort((a,b) => (b.dataConclusao || '').localeCompare(a.dataConclusao || ''));
    } else if(viewAllMode) {
      for(let w = 1; w <= 3; w++) {
        const weekTasks = tasks.filter(t => t.semana === w && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
        filtered.push(...weekTasks);
      }
    } else {
      filtered = tasks.filter(t => t.semana === currentWeek && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    }
    
    if(searchQuery.trim() !== "") {
      const q = searchQuery.trim().toLowerCase();
      filtered = filtered.filter(t => t.nome.toLowerCase().includes(q));
    }

    const container = document.getElementById("tasksContainer");
    if(filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:2rem;">Nenhum pedido encontrado ☁️</div>`;
      return;
    }

    let html = '';
    let lastWeek = null;
    
    filtered.forEach((task, index) => {
      if(viewAllMode && !showingConcluido && lastWeek !== task.semana) {
        lastWeek = task.semana;
        const weekNames = {1:'1ª Semana', 2:'2ª Semana', 3:'3ª Semana'};
        html += `<div class="week-separator"><i class="fas fa-calendar-week"></i> ${weekNames[task.semana]}</div>`;
      }
      
      const statusClass = `status-${task.status}`;
      const statusText = task.status === 'aguardando' ? '🟡 Aguardando' : (task.status === 'producao' ? '🟣 Produção' : (task.status === 'retirada' ? '🟢 Retirada' : '✅ Concluído'));
      
      let numero;
      if(showingConcluido) {
        numero = index + 1;
      } else if(viewAllMode) {
        const tasksInSameWeek = filtered.filter(t => t.semana === task.semana);
        const idxInWeek = tasksInSameWeek.findIndex(t => t.id === task.id);
        numero = idxInWeek + 1;
      } else {
        const weekFiltered = tasks.filter(t => t.semana === currentWeek && !t.concluido);
        const idxInWeek = weekFiltered.findIndex(t => t.id === task.id);
        numero = idxInWeek + 1;
      }
      
      const urgentClass = task.urgente && !task.concluido ? 'urgente' : '';
      const rotaClass = task.rotaEntrega && !task.concluido ? 'rota-entrega' : '';
      const concluidoClass = task.concluido ? 'concluido' : '';
      const urgentBadge = task.urgente && !task.concluido ? '<span class="urgent-chip"><i class="fas fa-exclamation-circle"></i> URGENTE</span>' : '';
      const rotaBadge = task.rotaEntrega && !task.concluido ? '<span class="rota-chip"><i class="fas fa-truck"></i> Rota de Entrega</span>' : '';
      const pagamentoClass = task.pagamento === "pago" ? "payment-pago" : "payment-aguardando";
      const pagamentoText = task.pagamento === "pago" ? "✅ Pago" : "⏳ Aguardando Pagamento";
      const concluidoBadge = task.concluido ? '<span class="urgent-chip" style="background:#22c55e;"><i class="fas fa-check-circle"></i> CONCLUÍDO</span>' : '';
      const dataEntregaFormatada = task.dataEntrega ? formatDate(task.dataEntrega) : 'Sem data';
      
      html += `
        <div class="task-card ${urgentClass} ${rotaClass} ${concluidoClass}" data-id="${task.id}" draggable="${!viewAllMode && !showingConcluido}">
          <div class="task-number" data-task-id="${task.id}" data-task-nome="${escapeHtml(task.nome)}" style="cursor: pointer;">${numero}</div>
          <div class="task-info">
            <span class="info-chip"><i class="fas fa-user"></i> ${escapeHtml(task.nome)}</span>
            <span class="info-chip"><i class="fas fa-phone"></i> ${escapeHtml(task.telefone || '—')}</span>
            <span class="info-chip"><i class="fas fa-clipboard-list"></i> ${escapeHtml(task.descricao.substring(0, 35))}</span>
            <span class="info-chip"><i class="fas fa-calendar-alt"></i> Entrega: ${dataEntregaFormatada}</span>
            <span class="info-chip"><i class="fas fa-dollar-sign"></i> R$ ${escapeHtml(task.valor)}</span>
            <span class="info-chip"><i class="fas fa-calendar-plus"></i> Lançado: ${formatDate(task.dataLancamento)}</span>
            ${task.concluido ? `<span class="info-chip"><i class="fas fa-check-circle"></i> Concluído em: ${formatDate(task.dataConclusao)}</span>` : ''}
            <span class="payment-status ${pagamentoClass}" onclick="window.togglePagamento(${task.id})" style="cursor:pointer;">${pagamentoText}</span>
            ${urgentBadge}
            ${rotaBadge}
            ${concluidoBadge}
          </div>
          ${!task.concluido ? `<div class="task-status ${statusClass}" onclick="window.cycleStatus(${task.id})" style="cursor:pointer;">
            ${statusText}
          </div>` : ''}
          <div class="task-actions">
            ${!task.concluido ? `
              <button class="icon-btn" onclick="window.moveTask(${task.id}, 'up')" title="Mover para cima" ${viewAllMode || showingConcluido ? 'disabled style="opacity:0.3;"' : ''}><i class="fas fa-arrow-up"></i></button>
              <button class="icon-btn" onclick="window.moveTask(${task.id}, 'down')" title="Mover para baixo" ${viewAllMode || showingConcluido ? 'disabled style="opacity:0.3;"' : ''}><i class="fas fa-arrow-down"></i></button>
              <button class="icon-btn urgent-btn" onclick="window.toggleUrgent(${task.id})" title="Marcar/Desmarcar Urgente"><i class="fas fa-exclamation-triangle"></i></button>
              <button class="icon-btn rota-btn" onclick="window.toggleRotaEntrega(${task.id})" title="Marcar/Desmarcar Rota de Entrega"><i class="fas fa-truck"></i></button>
            ` : ''}
            <button class="icon-btn concluir-btn" onclick="window.marcarConcluido(${task.id})" title="Marcar como Concluído" ${task.concluido ? 'disabled style="opacity:0.3;"' : ''}><i class="fas fa-check-circle"></i></button>
            <button class="icon-btn" onclick="window.editTaskModal(${task.id})"><i class="fas fa-edit"></i></button>
            <button class="icon-btn" onclick="window.deleteTaskConfirm(${task.id})"><i class="fas fa-trash-alt"></i></button>
            <button class="icon-btn whatsapp-btn" onclick="window.sendWhatsAppById(${task.id})"><i class="fab fa-whatsapp"></i></button>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = html;
    
    document.querySelectorAll('.task-number').forEach(el => {
      el.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        const taskId = parseInt(this.dataset.taskId);
        const taskNome = this.dataset.taskNome;
        abrirModalPosicao(taskId, taskNome);
      });
    });
    
    if(!viewAllMode && !showingConcluido) attachCardDragEvents();
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function abrirModalPosicao(taskId, taskNome) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido && !viewAllMode && !showingConcluido && !showingReceita && !showingClientes && !showingRota && !showingPosCompra) {
      const weekTasks = tasks.filter(t => t.semana === task.semana && !t.concluido);
      document.getElementById("pedidoNome").innerHTML = taskNome;
      document.getElementById("maxPosicao").innerHTML = weekTasks.length;
      document.getElementById("posicaoEditId").value = taskId;
      document.getElementById("novaPosicao").value = "";
      document.getElementById("posicaoModal").style.display = "flex";
    } else if(task && task.concluido) {
      alert("Pedidos concluídos não podem ter posição alterada");
    } else if(viewAllMode || showingConcluido || showingReceita || showingClientes || showingRota || showingPosCompra) {
      alert("Alterar posição disponível apenas na visualização por semana");
    }
  }

  function saveTaskFromModal() {
    const nome = nomeField.value.trim();
    if(!nome) { alert("Nome do cliente obrigatório"); return; }
    const telefone = telefoneField.value.trim();
    const descricao = descricaoField.value.trim();
    let dataEntrega = dataEntregaField.value;
    const valor = valorField.value.trim() || "0";
    const status = statusSelect.value;
    const pagamento = pagamentoSelect.value;
    const urgente = urgenteCheckbox.checked;
    const rotaEntrega = rotaEntregaCheckbox.checked;
    const editId = editIdField.value;
    
    if(!dataEntrega) {
      const dataPadrao = new Date();
      dataPadrao.setDate(dataPadrao.getDate() + 7);
      dataEntrega = dataPadrao.toISOString().split('T')[0];
    }
    
    if(editId) {
      const task = tasks.find(t => t.id == editId);
      if(task) {
        task.nome = nome;
        task.telefone = telefone;
        task.descricao = descricao;
        task.dataEntrega = dataEntrega;
        task.valor = valor;
        task.status = status;
        task.pagamento = pagamento;
        task.urgente = urgente;
        task.rotaEntrega = rotaEntrega;
        saveToLocal();
        renderTasks();
      }
    } else {
      const semanaParaAdicionar = (viewAllMode || showingConcluido) ? 1 : currentWeek;
      const newTask = {
        id: 0,
        semana: semanaParaAdicionar,
        nome: nome,
        telefone: telefone,
        descricao: descricao,
        dataEntrega: dataEntrega,
        valor: valor,
        status: status,
        pagamento: pagamento,
        urgente: urgente,
        rotaEntrega: rotaEntrega,
        concluido: false,
        ordem: 0,
        rotaOrdem: 0
      };
      addTask(newTask);
    }
    modal.style.display = "none";
    document.getElementById("sugestoesClientes").style.display = "none";
  }

      clientesContainer.style.display = "none";
      rotaContainer.style.display = "none";
      poscompraContainer.style.display = "none";
      actionsRow.style.display = "flex";
      renderTasks();
    });
  });
  
  concluidoTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingReceita) setReceitaMode(false);
    if(showingClientes) setClientesMode(false);
    if(showingRota) setRotaMode(false);
    if(showingPosCompra) setPosCompraMode(false);
    setConcluidoMode(true);
  });
  
  receitaTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingConcluido) setConcluidoMode(false);
    if(showingClientes) setClientesMode(false);
    if(showingRota) setRotaMode(false);
    if(showingPosCompra) setPosCompraMode(false);
    setReceitaMode(true);
  });
  
  clientesTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingConcluido) setConcluidoMode(false);
    if(showingReceita) setReceitaMode(false);
    if(showingRota) setRotaMode(false);
    if(showingPosCompra) setPosCompraMode(false);
    setClientesMode(true);
  });

  rotaTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingConcluido) setConcluidoMode(false);
    if(showingReceita) setReceitaMode(false);
    if(showingClientes) setClientesMode(false);
    if(showingPosCompra) setPosCompraMode(false);
    setRotaMode(true);
  });

  poscompraTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingConcluido) setConcluidoMode(false);
    if(showingReceita) setReceitaMode(false);
    if(showingClientes) setClientesMode(false);
    if(showingRota) setRotaMode(false);
    setPosCompraMode(true);
  });
  
  viewAllBtn.addEventListener("click", () => {
    if(showingConcluido) setConcluidoMode(false);
    if(showingReceita) setReceitaMode(false);
    if(showingClientes) setClientesMode(false);
    if(showingRota) setRotaMode(false);
    if(showingPosCompra) setPosCompraMode(false);
    setViewAllMode(true);
  });

  document.getElementById("exportCSVBtn").addEventListener("click", exportToCSV);
  document.getElementById("importFile").addEventListener("change", (e) => {
    if(e.target.files.length > 0) {
      importFromCSV(e.target.files[0]);
      e.target.value = "";
    }
  });
  document.getElementById("gerarPDFBtn").addEventListener("click", abrirModalPDF);

  const searchInput = document.getElementById("searchInput");
  searchInput.addEventListener("input", (e) => {
    searchQuery = e.target.value;
    if(!showingReceita && !showingClientes && !showingRota && !showingPosCompra) renderTasks();
  });

  const themeToggle = document.getElementById("themeToggle");
  const themeTextSpan = document.getElementById("themeText");
  function applyTheme(theme) {
    if(theme === 'dark') {
      document.body.classList.add('dark');
      localStorage.setItem('theme', 'dark');
      themeTextSpan.innerText = 'Claro';
      themeToggle.innerHTML = '<i class="fas fa-sun"></i> <span>Claro</span>';
    } else {
      document.body.classList.remove('dark');
      localStorage.setItem('theme', 'light');
      themeTextSpan.innerText = 'Escuro';
      themeToggle.innerHTML = '<i class="fas fa-moon"></i> <span>Escuro</span>';
    }
    if(showingReceita) renderReceita();
    if(showingClientes) renderClientes();
    if(showingRota) renderRota();
    if(showingPosCompra) renderPosCompra();
  }
  const savedTheme = localStorage.getItem('theme') || 'light';
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", () => {
    const isDark = document.body.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
  });

  loadData();
  renderTasks();
  setupDragAndDrop();
</script>
</body>
</html>
