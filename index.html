<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FlowTasks - Gestão de Pedidos</title>
  <!-- Font Awesome 6 (ícones modernos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Chart.js para gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
    }

    :root {
      --bg-page: #f4f7fc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --header-bg: #ffffffcc;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --status-aguardando: #f59e0b;
      --status-producao: #8b5cf6;
      --status-retirada: #10b981;
      --status-concluido: #22c55e;
      --urgent-bg: #fee2e2;
      --urgent-border: #ef4444;
      --pagamento-aguardando: #f59e0b;
      --pagamento-pago: #10b981;
      --rota-entrega-bg: #dbeafe;
      --rota-entrega-border: #3b82f6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --concluido-bg: #f0fdf4;
      --concluido-border: #22c55e;
      --receita-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body.dark {
      --bg-page: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
      --header-bg: #1e293bcc;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --urgent-bg: #450a0a;
      --urgent-border: #ef4444;
      --pagamento-aguardando: #f59e0b;
      --pagamento-pago: #10b981;
      --rota-entrega-bg: #1e3a5f;
      --rota-entrega-border: #60a5fa;
      --concluido-bg: #064e3b;
      --concluido-border: #22c55e;
      --receita-bg: linear-gradient(135deg, #4c51bf 0%, #5b3a8c 100%);
    }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(12px);
      background: var(--header-bg);
      border-radius: 2rem;
      padding: 0.75rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
      font-size: 1.3rem;
    }

    .logo-area i {
      color: var(--accent);
      font-size: 1.6rem;
    }

    .dn-tarefas {
      background: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .semana-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.6rem 1.4rem;
      font-weight: 600;
      border-radius: 2rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      position: relative;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
    }

    .tab-btn.concluido-btn {
      background: var(--status-concluido);
      color: white;
    }

    .tab-btn.concluido-btn.active {
      background: #16a34a;
      box-shadow: 0 2px 8px rgba(34,197,94,0.3);
    }

    .tab-btn.receita-btn {
      background: var(--receita-bg);
      color: white;
    }

    .tab-btn.receita-btn.active {
      opacity: 0.9;
      box-shadow: 0 2px 8px rgba(102,126,234,0.5);
    }

    .tab-btn.drag-over {
      background: var(--accent);
      opacity: 0.7;
      transform: scale(1.02);
    }

    .view-all-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .actions-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    .search-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 200px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      color: var(--text-primary);
    }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 2rem;
      padding: 0 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-add:hover { background: var(--accent-hover); }

    .tasks-horizontal {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .week-separator {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: white;
      border-radius: 2rem;
      font-weight: 600;
      display: inline-block;
    }

    .task-card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: all 0.2s;
      cursor: grab;
      position: relative;
    }

    .task-card:active {
      cursor: grabbing;
    }

    .task-card.urgente {
      border-left: 6px solid #ef4444;
      background: var(--urgent-bg);
    }

    .task-card.rota-entrega {
      border-right: 6px solid var(--accent);
      background: var(--rota-entrega-bg);
    }

    .task-card.concluido {
      opacity: 0.85;
      background: var(--concluido-bg);
      border: 1px solid var(--concluido-border);
    }

    .task-number {
      font-weight: 800;
      font-size: 1.4rem;
      background: var(--accent);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      color: white;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .task-number:hover {
      transform: scale(1.05);
      background: var(--accent-hover);
    }

    .task-info {
      flex: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: baseline;
    }

    .info-chip {
      background: var(--bg-page);
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .urgent-chip {
      background: #ef4444;
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .rota-chip {
      background: var(--accent);
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .payment-status {
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
    }

    .payment-aguardando {
      background: var(--pagamento-aguardando);
      color: white;
    }

    .payment-pago {
      background: var(--pagamento-pago);
      color: white;
    }

    .task-status {
      min-width: 120px;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      text-align: center;
      font-weight: 600;
      background: #e2e8f0;
      color: #1e293b;
      cursor: pointer;
    }

    .status-aguardando { background: #fef3c7; color: #b45309; }
    .status-producao { background: #ede9fe; color: #6d28d9; }
    .status-retirada { background: #d1fae5; color: #047857; }
    .status-concluido { background: #22c55e; color: white; }

    .task-actions {
      display: flex;
      gap: 0.7rem;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 40px;
      transition: 0.1s;
      color: var(--text-secondary);
    }

    .icon-btn:hover { background: var(--border); }

    .whatsapp-btn {
      color: #25D366;
    }

    .urgent-btn {
      color: #ef4444;
    }

    .rota-btn {
      color: var(--accent);
    }

    .concluir-btn {
      color: #22c55e;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 550px;
      border: 1px solid var(--border);
      animation: fadeUp 0.2s;
    }

    .modal-content input, .modal-content select, .modal-content textarea {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.25rem;
      margin-bottom: 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--bg-page);
      color: var(--text-primary);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .checkbox-row input {
      width: auto;
      margin: 0;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 0.8rem;
    }

    .posicao-input-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }

    .posicao-input-group input {
      width: 80px;
      margin-bottom: 0;
      text-align: center;
    }

    /* Estilos da aba Receita */
    .receita-container {
      background: var(--card-bg);
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }

    .receita-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .receita-total {
      background: var(--receita-bg);
      padding: 1rem 2rem;
      border-radius: 1rem;
      color: white;
      text-align: center;
    }

    .receita-total h3 {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .receita-total .valor {
      font-size: 2rem;
      font-weight: 700;
    }

    .filtros-receita {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .filtro-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: var(--bg-page);
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      border: 1px solid var(--border);
    }

    .filtro-group label {
      font-weight: 500;
    }

    .filtro-group input, .filtro-group select {
      background: transparent;
      border: none;
      padding: 0.3rem;
      color: var(--text-primary);
      outline: none;
    }

    .btn-filtrar {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    .tipo-receita {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .tipo-receita-btn {
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      border: 1px solid var(--border);
      background: var(--bg-page);
      cursor: pointer;
    }

    .tipo-receita-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .receita-lista {
      max-height: 400px;
      overflow-y: auto;
    }

    .receita-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .receita-item:hover {
      background: var(--bg-page);
    }

    .chart-container {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--bg-page);
      border-radius: 1rem;
    }

    canvas {
      max-height: 300px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 720px) {
      .task-card { flex-direction: column; align-items: stretch; }
      .task-info { justify-content: flex-start; }
      .task-actions { justify-content: flex-end; }
      .receita-header { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <div class="logo-area">
      <i class="fas fa-tasks"></i>
      <div class="dn-tarefas"><i class="fas fa-calendar-day"></i> DN Tarefas Diárias</div>
    </div>
    <div class="theme-toggle" id="themeToggle">
      <i class="fas fa-moon"></i> <span id="themeText">Escuro</span>
    </div>
  </div>

  <div class="semana-tabs" id="tabContainer">
    <button class="tab-btn active" data-week="1" data-week-num="1">📅 1ª Semana</button>
    <button class="tab-btn" data-week="2" data-week-num="2">📆 2ª Semana</button>
    <button class="tab-btn" data-week="3" data-week-num="3">🗓️ 3ª Semana</button>
    <button class="tab-btn concluido-btn" data-view="concluido" id="concluidoTab">✅ Concluído</button>
    <button class="tab-btn receita-btn" data-view="receita" id="receitaTab">💰 RECEITA</button>
    <button class="view-all-btn" id="viewAllBtn"><i class="fas fa-list-ul"></i> Todos os Pedidos</button>
  </div>

  <div class="actions-row" id="actionsRow">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Consultar por nome do cliente...">
    </div>
    <button class="btn-add" id="openAddModalBtn"><i class="fas fa-plus"></i> Novo Pedido</button>
  </div>

  <div id="tasksContainer" class="tasks-horizontal"></div>
  <div id="receitaContainer" style="display: none;"></div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Adicionar Pedido</h3>
    <input type="hidden" id="editId" value="">
    <label>Nome *</label>
    <input type="text" id="nome" placeholder="Cliente" autocomplete="off">
    <label>Telefone (com DDD)</label>
    <input type="tel" id="telefone" placeholder="(11) 99999-9999">
    <label>Descrição serviço</label>
    <textarea id="descricao" rows="2" placeholder="Ex: Conserto de notebook..."></textarea>
    <label>Data entrega</label>
    <input type="date" id="dataEntrega">
    <label>Valor (R$)</label>
    <input type="text" id="valor" placeholder="0,00">
    <label>Status do Pedido</label>
    <select id="statusSelect">
      <option value="aguardando">🟠 Aguardando</option>
      <option value="producao">🟣 Produção</option>
      <option value="retirada">🟢 Retirada</option>
    </select>
    <label>Status de Pagamento</label>
    <select id="pagamentoSelect">
      <option value="aguardando">💰 Aguardando Pagamento</option>
      <option value="pago">✅ Pago</option>
    </select>
    <div class="checkbox-row">
      <input type="checkbox" id="urgenteCheckbox">
      <label for="urgenteCheckbox">🔴 Marcar como URGENTE</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="rotaEntregaCheckbox">
      <label for="rotaEntregaCheckbox">🚚 Rota de Entrega (hoje)</label>
    </div>
    <div class="modal-buttons">
      <button class="icon-btn" id="closeModalBtn" style="background: var(--border); padding: 0.5rem 1.2rem;">Cancelar</button>
      <button class="btn-add" id="saveTaskBtn" style="border-radius: 2rem;">Salvar</button>
    </div>
  </div>
</div>

<div id="posicaoModal" class="modal">
  <div class="modal-content">
    <h3>Alterar Posição do Pedido</h3>
    <p style="margin-bottom: 1rem; color: var(--text-secondary);">Pedido: <strong id="pedidoNome"></strong></p>
    <input type="hidden" id="posicaoEditId" value="">
    <label>Nova posição (número)</label>
    <div class="posicao-input-group">
      <input type="number" id="novaPosicao" min="1" step="1" placeholder="Nº">
      <button class="btn-add" id="confirmarPosicaoBtn" style="padding: 0.5rem 1rem;">Aplicar</button>
    </div>
    <small>Digite o número da nova posição desejada (1 a <span id="maxPosicao"></span>)</small>
    <div class="modal-buttons" style="margin-top: 1rem;">
      <button class="icon-btn" id="closePosicaoModalBtn" style="background: var(--border); padding: 0.5rem 1.2rem;">Cancelar</button>
    </div>
  </div>
</div>

<script>
  let tasks = [];
  let historicoReceita = [];
  let currentWeek = 1;
  let searchQuery = "";
  let nextId = 100;
  let viewAllMode = false;
  let showingConcluido = false;
  let showingReceita = false;
  let receitaChart = null;
  let tipoReceitaAtual = "pago";

  function loadData() {
    const stored = localStorage.getItem("flowtasks_app");
    if(stored) {
      tasks = JSON.parse(stored);
      if(tasks.length) {
        const maxId = Math.max(...tasks.map(t => t.id), 0);
        nextId = maxId + 1;
      }
      tasks.forEach(t => { 
        if(t.urgente === undefined) t.urgente = false;
        if(t.dataLancamento === undefined) t.dataLancamento = new Date().toISOString().split('T')[0];
        if(t.pagamento === undefined) t.pagamento = "aguardando";
        if(t.rotaEntrega === undefined) t.rotaEntrega = false;
        if(t.concluido === undefined) t.concluido = false;
        if(t.status === undefined) t.status = "aguardando";
      });
    } else {
      const hoje = new Date().toISOString().split('T')[0];
      const ontem = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      tasks = [
        { id: 1, semana: 1, nome: "Ana Souza", telefone: "11999991111", descricao: "Manutenção PC", dataEntrega: "2026-06-15", valor: "250,00", status: "aguardando", ordem: 0, urgente: true, dataLancamento: ontem, pagamento: "aguardando", rotaEntrega: false, concluido: false },
        { id: 2, semana: 1, nome: "Carlos Lima", telefone: "21988887777", descricao: "Formatação", dataEntrega: "2026-06-18", valor: "120,00", status: "producao", ordem: 1, urgente: false, dataLancamento: hoje, pagamento: "pago", rotaEntrega: true, concluido: false },
        { id: 3, semana: 2, nome: "Mariana Rocha", telefone: "31977776666", descricao: "Troca de Tela", dataEntrega: "2026-06-22", valor: "450,00", status: "retirada", ordem: 0, urgente: true, dataLancamento: hoje, pagamento: "aguardando", rotaEntrega: false, concluido: false }
      ];
      nextId = 4;
    }
    
    // Carregar histórico de receita
    const storedHistorico = localStorage.getItem("flowtasks_historico_receita");
    if(storedHistorico) {
      historicoReceita = JSON.parse(storedHistorico);
    } else {
      // Criar histórico inicial baseado nos pedidos já pagos
      historicoReceita = [];
      tasks.forEach(task => {
        if(task.pagamento === "pago") {
          historicoReceita.push({
            id: task.id,
            nome: task.nome,
            valor: task.valor,
            dataPagamento: task.dataLancamento,
            descricao: task.descricao
          });
        }
      });
      saveHistoricoReceita();
    }
    
    reorderAllByWeek();
  }

  function saveHistoricoReceita() {
    localStorage.setItem("flowtasks_historico_receita", JSON.stringify(historicoReceita));
  }

  function registrarReceita(task) {
    // Verificar se já existe no histórico
    const existe = historicoReceita.some(h => h.id === task.id);
    if(!existe && task.pagamento === "pago") {
      historicoReceita.push({
        id: task.id,
        nome: task.nome,
        valor: task.valor,
        dataPagamento: task.dataLancamento,
        descricao: task.descricao
      });
      saveHistoricoReceita();
    }
  }

  function removerReceita(taskId) {
    historicoReceita = historicoReceita.filter(h => h.id !== taskId);
    saveHistoricoReceita();
  }

  function reorderAllByWeek() {
    for(let w=1; w<=3; w++) {
      let weekTasks = tasks.filter(t => t.semana === w && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
      weekTasks.forEach((t, idx) => { t.ordem = idx; });
    }
    saveToLocal();
  }

  function saveToLocal() {
    localStorage.setItem("flowtasks_app", JSON.stringify(tasks));
  }

  function moveTaskToWeek(taskId, targetWeek) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.semana === targetWeek || task.concluido) return;
    
    const oldWeek = task.semana;
    task.semana = targetWeek;
    
    const oldWeekTasks = tasks.filter(t => t.semana === oldWeek && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    const newWeekTasks = tasks.filter(t => t.semana === targetWeek && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    
    oldWeekTasks.forEach((t, idx) => { t.ordem = idx; });
    newWeekTasks.forEach((t, idx) => { t.ordem = idx; });
    
    saveToLocal();
    renderTasks();
  }

  function moveTask(taskId, direction) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.concluido) return;
    
    let weekTasks = tasks.filter(t => t.semana === task.semana && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    const currentIndex = weekTasks.findIndex(t => t.id === taskId);
    
    if(direction === 'up' && currentIndex > 0) {
      const tempOrdem = weekTasks[currentIndex].ordem;
      weekTasks[currentIndex].ordem = weekTasks[currentIndex - 1].ordem;
      weekTasks[currentIndex - 1].ordem = tempOrdem;
    } else if(direction === 'down' && currentIndex < weekTasks.length - 1) {
      const tempOrdem = weekTasks[currentIndex].ordem;
      weekTasks[currentIndex].ordem = weekTasks[currentIndex + 1].ordem;
      weekTasks[currentIndex + 1].ordem = tempOrdem;
    }
    
    weekTasks.sort((a,b) => (a.ordem||0) - (b.ordem||0));
    weekTasks.forEach((t, idx) => { t.ordem = idx; });
    
    saveToLocal();
    renderTasks();
  }

  function ajustarPosicao(taskId, novaPosicao) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.concluido) return false;
    
    let weekTasks = tasks.filter(t => t.semana === task.semana && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    
    if(novaPosicao < 1 || novaPosicao > weekTasks.length) {
      alert(`Posição inválida! Escolha entre 1 e ${weekTasks.length}`);
      return false;
    }
    
    const currentIndex = weekTasks.findIndex(t => t.id === taskId);
    const targetIndex = novaPosicao - 1;
    
    if(currentIndex === targetIndex) return false;
    
    weekTasks.splice(currentIndex, 1);
    weekTasks.splice(targetIndex, 0, task);
    
    weekTasks.forEach((t, idx) => { t.ordem = idx; });
    
    saveToLocal();
    renderTasks();
    return true;
  }
  
  function toggleUrgent(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido) {
      task.urgente = !task.urgente;
      saveToLocal();
      renderTasks();
    }
  }

  function toggleRotaEntrega(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido) {
      task.rotaEntrega = !task.rotaEntrega;
      saveToLocal();
      renderTasks();
    }
  }

  function togglePagamento(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task) {
      const eraPago = task.pagamento === "pago";
      task.pagamento = task.pagamento === "aguardando" ? "pago" : "aguardando";
      
      if(task.pagamento === "pago" && !eraPago) {
        registrarReceita(task);
      } else if(task.pagamento === "aguardando" && eraPago) {
        removerReceita(task.id);
      }
      
      saveToLocal();
      renderTasks();
      if(showingReceita) renderReceita();
    }
  }

  function marcarConcluido(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido) {
      task.concluido = true;
      task.dataConclusao = new Date().toISOString().split('T')[0];
      saveToLocal();
      renderTasks();
    }
  }

  function addTask(task) {
    task.id = nextId++;
    task.dataLancamento = new Date().toISOString().split('T')[0];
    if(!task.pagamento) task.pagamento = "aguardando";
    if(task.rotaEntrega === undefined) task.rotaEntrega = false;
    if(task.concluido === undefined) task.concluido = false;
    tasks.push(task);
    
    if(task.pagamento === "pago") {
      registrarReceita(task);
    }
    
    reorderAllByWeek();
    renderTasks();
  }
  
  function updateTask(updated) {
    const index = tasks.findIndex(t => t.id === updated.id);
    if(index !== -1) {
      const oldTask = tasks[index];
      const eraPago = oldTask.pagamento === "pago";
      updated.dataLancamento = oldTask.dataLancamento;
      updated.concluido = oldTask.concluido;
      updated.dataConclusao = oldTask.dataConclusao;
      tasks[index] = updated;
      
      if(updated.pagamento === "pago" && !eraPago) {
        registrarReceita(updated);
      } else if(updated.pagamento === "aguardando" && eraPago) {
        removerReceita(updated.id);
      }
      
      reorderAllByWeek();
      renderTasks();
      if(showingReceita) renderReceita();
    }
  }
  
  function deleteTask(id) {
    const task = tasks.find(t => t.id === id);
    if(task && task.pagamento === "pago") {
      removerReceita(id);
    }
    tasks = tasks.filter(t => t.id !== id);
    reorderAllByWeek();
    renderTasks();
    if(showingReceita) renderReceita();
  }

  function sendWhatsApp(task) {
    if(!task.telefone || task.telefone.trim() === "") {
      alert("Número de telefone não informado para enviar mensagem.");
      return;
    }
    let numero = task.telefone.replace(/\D/g, '');
    if(numero.length < 10) { alert("Número inválido"); return; }
    
    const pagamentoText = task.pagamento === "pago" ? "✅ *PAGO*" : "⏳ *Aguardando Pagamento*";
    
    let msg;
    
    if(task.concluido) {
      msg = `Olá ${task.nome}, seu pedido *${task.descricao}* foi *CONCLUÍDO* com sucesso! ✅%0A💰 Valor: R$ ${task.valor}%0A💵 Status de pagamento: ${pagamentoText}%0A🎉 Agradecemos pela preferência!`;
    } else if(task.rotaEntrega) {
      msg = `Olá ${task.nome}, seu pedido *${task.descricao}* está em rota de entrega! 🚚%0A💰 Valor: R$ ${task.valor}%0A💵 Status de pagamento: ${pagamentoText}%0A✅ Seu pedido será entregue hoje! Agradecemos a preferência.`;
    } else {
      const statusText = task.status === 'aguardando' ? 'Aguardando' : (task.status === 'producao' ? 'Em Produção' : 'Pronto para Retirada');
      msg = `Olá ${task.nome}, seu pedido *${task.descricao}* está com status: ${statusText}.%0A📅 Entrega prevista: ${task.dataEntrega || 'não definida'}%0A💰 Valor: R$ ${task.valor}%0A💵 Status de pagamento: ${pagamentoText}%0A✅ Pedido finalizado! Agradecemos a preferência.`;
    }
    
    window.open(`https://wa.me/55${numero}?text=${msg}`, '_blank');
  }

  function cycleStatus(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if(!task || task.concluido) return;
    const statusOrder = ['aguardando', 'producao', 'retirada'];
    let idx = statusOrder.indexOf(task.status);
    let newIdx = (idx+1) % statusOrder.length;
    task.status = statusOrder[newIdx];
    saveToLocal();
    renderTasks();
  }

  let draggedTaskId = null;
  
  function setupDragAndDrop() {
    const tabs = document.querySelectorAll('.tab-btn:not(#concluidoTab):not(#receitaTab)');
    tabs.forEach(tab => {
      tab.addEventListener('dragover', (e) => {
        e.preventDefault();
        if(!viewAllMode && !showingConcluido && !showingReceita) tab.classList.add('drag-over');
      });
      tab.addEventListener('dragleave', () => {
        tab.classList.remove('drag-over');
      });
      tab.addEventListener('drop', (e) => {
        e.preventDefault();
        tab.classList.remove('drag-over');
        const targetWeek = parseInt(tab.dataset.week);
        if(draggedTaskId && targetWeek && !viewAllMode && !showingConcluido && !showingReceita) {
          moveTaskToWeek(draggedTaskId, targetWeek);
          draggedTaskId = null;
        }
      });
    });
  }
  
  function attachCardDragEvents() {
    const cards = document.querySelectorAll('.task-card');
    cards.forEach(card => {
      card.setAttribute('draggable', 'true');
      card.addEventListener('dragstart', (e) => {
        if(viewAllMode || showingConcluido || showingReceita) {
          e.preventDefault();
          return false;
        }
        draggedTaskId = parseInt(card.dataset.id);
        e.dataTransfer.setData('text/plain', draggedTaskId);
        card.style.opacity = '0.5';
      });
      card.addEventListener('dragend', (e) => {
        card.style.opacity = '';
        draggedTaskId = null;
      });
    });
  }

  function formatDate(dateStr) {
    if(!dateStr) return '—';
    const partes = dateStr.split('-');
    if(partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
    return dateStr;
  }

  function formatarValor(valor) {
    if(!valor) return "0,00";
    let v = valor.toString().replace(/[^\d,.-]/g, '');
    if(v.includes(',')) {
      v = v.replace(/\./g, '');
    } else if(v.includes('.')) {
      let partes = v.split('.');
      if(partes.length === 2) {
        v = partes[0] + ',' + partes[1].padEnd(2, '0').slice(0,2);
      }
    }
    return v;
  }

  function converterParaNumero(valorStr) {
    if(!valorStr) return 0;
    let v = valorStr.toString().replace(/\./g, '').replace(',', '.');
    let num = parseFloat(v);
    return isNaN(num) ? 0 : num;
  }

  function renderReceita() {
    const dataInicio = document.getElementById("dataInicio")?.value;
    const dataFim = document.getElementById("dataFim")?.value;
    const tipoFiltro = document.getElementById("tipoFiltro")?.value;
    
    let receitasFiltradas = [...historicoReceita];
    
    if(tipoReceitaAtual === "pago") {
      receitasFiltradas = historicoReceita;
    } else {
      // Projeção: todos os pedidos (mesmo não pagos)
      receitasFiltradas = tasks.filter(t => !t.concluido).map(t => ({
        id: t.id,
        nome: t.nome,
        valor: t.valor,
        dataPagamento: t.dataEntrega || t.dataLancamento,
        descricao: t.descricao,
        status_pagamento: t.pagamento
      }));
    }
    
    // Filtrar por período
    if(dataInicio && dataFim) {
      const inicio = new Date(dataInicio);
      const fim = new Date(dataFim);
      fim.setHours(23, 59, 59);
      receitasFiltradas = receitasFiltradas.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicio && data <= fim;
      });
    } else if(tipoFiltro === "semana") {
      const hoje = new Date();
      const inicioSemana = new Date(hoje);
      inicioSemana.setDate(hoje.getDate() - hoje.getDay());
      const fimSemana = new Date(hoje);
      fimSemana.setDate(hoje.getDate() + (6 - hoje.getDay()));
      receitasFiltradas = receitasFiltradas.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioSemana && data <= fimSemana;
      });
    } else if(tipoFiltro === "mes") {
      const hoje = new Date();
      const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
      const fimMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
      receitasFiltradas = receitasFiltradas.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioMes && data <= fimMes;
      });
    } else if(tipoFiltro === "ano") {
      const hoje = new Date();
      const inicioAno = new Date(hoje.getFullYear(), 0, 1);
      const fimAno = new Date(hoje.getFullYear(), 11, 31);
      receitasFiltradas = receitasFiltradas.filter(r => {
        const data = new Date(r.dataPagamento);
        return data >= inicioAno && data <= fimAno;
      });
    }
    
    const total = receitasFiltradas.reduce((sum, r) => sum + converterParaNumero(r.valor), 0);
    
    // Agrupar por mês para o gráfico
    const meses = {};
    receitasFiltradas.forEach(r => {
      const data = new Date(r.dataPagamento);
      const mesAno = `${data.getMonth()+1}/${data.getFullYear()}`;
      meses[mesAno] = (meses[mesAno] || 0) + converterParaNumero(r.valor);
    });
    
    const html = `
      <div class="receita-container">
        <div class="receita-header">
          <div class="receita-total">
            <h3>${tipoReceitaAtual === "pago" ? "💰 TOTAL RECEBIDO" : "📊 PROJEÇÃO DE FATURAMENTO"}</h3>
            <div class="valor">R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
          </div>
          <div class="tipo-receita">
            <button class="tipo-receita-btn ${tipoReceitaAtual === 'pago' ? 'active' : ''}" onclick="window.setTipoReceita('pago')">✅ Apenas Pagos</button>
            <button class="tipo-receita-btn ${tipoReceitaAtual === 'todos' ? 'active' : ''}" onclick="window.setTipoReceita('todos')">📈 Projeção (Todos)</button>
          </div>
        </div>
        
        <div class="filtros-receita">
          <div class="filtro-group">
            <label>Período:</label>
            <select id="tipoFiltro">
              <option value="todos">Todos</option>
              <option value="semana">Esta Semana</option>
              <option value="mes">Este Mês</option>
              <option value="ano">Este Ano</option>
              <option value="personalizado">Personalizado</option>
            </select>
          </div>
          <div class="filtro-group" id="periodoPersonalizado" style="display: none;">
            <label>De:</label>
            <input type="date" id="dataInicio">
            <label>Até:</label>
            <input type="date" id="dataFim">
          </div>
          <button class="btn-filtrar" onclick="window.aplicarFiltroReceita()">Filtrar</button>
        </div>
        
        <div class="chart-container">
          <canvas id="receitaChart"></canvas>
        </div>
        
        <h3 style="margin: 1rem 0 0.5rem 0;">📋 Histórico de Receitas</h3>
        <div class="receita-lista">
          ${receitasFiltradas.length === 0 ? '<div style="text-align:center; padding:2rem;">Nenhuma receita encontrada</div>' : 
            receitasFiltradas.map(r => `
              <div class="receita-item">
                <div>
                  <strong>${escapeHtml(r.nome)}</strong><br>
                  <small>${escapeHtml(r.descricao?.substring(0, 30) || '')}</small>
                </div>
                <div>
                  <span style="color: #10b981; font-weight: bold;">R$ ${formatarValor(r.valor)}</span><br>
                  <small>${formatDate(r.dataPagamento)}</small>
                  ${r.status_pagamento === 'aguardando' ? '<small style="color: #f59e0b;"> (Pendente)</small>' : ''}
                </div>
              </div>
            `).join('')
          }
        </div>
      </div>
    `;
    
    const receitaContainer = document.getElementById("receitaContainer");
    if(receitaContainer) {
      receitaContainer.innerHTML = html;
      
      // Configurar eventos do filtro
      const tipoFiltroSelect = document.getElementById("tipoFiltro");
      const periodoPersonalizado = document.getElementById("periodoPersonalizado");
      if(tipoFiltroSelect) {
        tipoFiltroSelect.addEventListener("change", (e) => {
          periodoPersonalizado.style.display = e.target.value === "personalizado" ? "flex" : "none";
        });
      }
      
      // Criar gráfico
      const ctx = document.getElementById('receitaChart')?.getContext('2d');
      if(ctx && receitaChart) {
        receitaChart.destroy();
      }
      if(ctx && Object.keys(meses).length > 0) {
        receitaChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: Object.keys(meses),
            datasets: [{
              label: tipoReceitaAtual === "pago" ? 'Valor Recebido (R$)' : 'Projeção de Faturamento (R$)',
              data: Object.values(meses),
              backgroundColor: 'rgba(59, 130, 246, 0.6)',
              borderColor: 'rgba(59, 130, 246, 1)',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { position: 'top' },
              tooltip: { callbacks: { label: (ctx) => `R$ ${ctx.raw.toLocaleString('pt-BR', {minimumFractionDigits: 2})}` } }
            },
            scales: { y: { ticks: { callback: (v) => `R$ ${v.toLocaleString('pt-BR')}` } } }
          }
        });
      }
    }
  }

  function aplicarFiltroReceita() {
    renderReceita();
  }

  function setTipoReceita(tipo) {
    tipoReceitaAtual = tipo;
    renderReceita();
  }

  window.setTipoReceita = setTipoReceita;
  window.aplicarFiltroReceita = aplicarFiltroReceita;

  function renderTasks() {
    let filtered = [];
    
    if(showingReceita) {
      renderReceita();
      return;
    } else if(showingConcluido) {
      filtered = tasks.filter(t => t.concluido === true);
      filtered.sort((a,b) => (b.dataConclusao || '').localeCompare(a.dataConclusao || ''));
    } else if(viewAllMode) {
      for(let w = 1; w <= 3; w++) {
        const weekTasks = tasks.filter(t => t.semana === w && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
        filtered.push(...weekTasks);
      }
    } else {
      filtered = tasks.filter(t => t.semana === currentWeek && !t.concluido).sort((a,b) => (a.ordem||0) - (b.ordem||0));
    }
    
    if(searchQuery.trim() !== "") {
      const q = searchQuery.trim().toLowerCase();
      filtered = filtered.filter(t => t.nome.toLowerCase().includes(q));
    }

    const container = document.getElementById("tasksContainer");
    if(filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:2rem;">Nenhum pedido encontrado ☁️</div>`;
      return;
    }

    let html = '';
    let lastWeek = null;
    
    filtered.forEach((task, index) => {
      if(viewAllMode && !showingConcluido && lastWeek !== task.semana) {
        lastWeek = task.semana;
        const weekNames = {1:'1ª Semana', 2:'2ª Semana', 3:'3ª Semana'};
        html += `<div class="week-separator"><i class="fas fa-calendar-week"></i> ${weekNames[task.semana]}</div>`;
      }
      
      const statusClass = `status-${task.status}`;
      const statusText = task.status === 'aguardando' ? '🟡 Aguardando' : (task.status === 'producao' ? '🟣 Produção' : (task.status === 'retirada' ? '🟢 Retirada' : '✅ Concluído'));
      
      let numero;
      if(showingConcluido) {
        numero = index + 1;
      } else if(viewAllMode) {
        const tasksInSameWeek = filtered.filter(t => t.semana === task.semana);
        const idxInWeek = tasksInSameWeek.findIndex(t => t.id === task.id);
        numero = idxInWeek + 1;
      } else {
        const weekFiltered = tasks.filter(t => t.semana === currentWeek && !t.concluido);
        const idxInWeek = weekFiltered.findIndex(t => t.id === task.id);
        numero = idxInWeek + 1;
      }
      
      const urgentClass = task.urgente && !task.concluido ? 'urgente' : '';
      const rotaClass = task.rotaEntrega && !task.concluido ? 'rota-entrega' : '';
      const concluidoClass = task.concluido ? 'concluido' : '';

      const pagamentoClass = task.pagamento === "pago" ? "payment-pago" : "payment-aguardando";
      const pagamentoText = task.pagamento === "pago" ? "✅ Pago" : "⏳ Aguardando Pagamento";
      const concluidoBadge = task.concluido ? '<span class="urgent-chip" style="background:#22c55e;"><i class="fas fa-check-circle"></i> CONCLUÍDO</span>' : '';
      
      html += `
        <div class="task-card ${urgentClass} ${rotaClass} ${concluidoClass}" data-id="${task.id}" draggable="${!viewAllMode && !showingConcluido}">
          <div class="task-number" data-task-id="${task.id}" data-task-nome="${escapeHtml(task.nome)}" style="cursor: pointer;">${numero}</div>
          <div class="task-info">
            <span class="info-chip"><i class="fas fa-user"></i> ${escapeHtml(task.nome)}</span>
            <span class="info-chip"><i class="fas fa-phone"></i> ${escapeHtml(task.telefone || '—')}</span>
            <span class="info-chip"><i class="fas fa-clipboard-list"></i> ${escapeHtml(task.descricao.substring(0, 35))}</span>
            <span class="info-chip"><i class="fas fa-calendar-alt"></i> Entrega: ${formatDate(task.dataEntrega)}</span>
            <span class="info-chip"><i class="fas fa-dollar-sign"></i> R$ ${escapeHtml(task.valor)}</span>
            <span class="info-chip"><i class="fas fa-calendar-plus"></i> Lançado: ${formatDate(task.dataLancamento)}</span>
            ${task.concluido ? `<span class="info-chip"><i class="fas fa-check-circle"></i> Concluído em: ${formatDate(task.dataConclusao)}</span>` : ''}
            <span class="payment-status ${pagamentoClass}" onclick="window.togglePagamento(${task.id})" style="cursor:pointer;">${pagamentoText}</span>
            ${urgentBadge}
            ${rotaBadge}
            ${concluidoBadge}
          </div>
          ${!task.concluido ? `<div class="task-status ${statusClass}" onclick="window.cycleStatus(${task.id})" style="cursor:pointer;">
            ${statusText}
          </div>` : ''}
          <div class="task-actions">
            ${!task.concluido ? `
              <button class="icon-btn" onclick="window.moveTask(${task.id}, 'up')" title="Mover para cima" ${viewAllMode || showingConcluido ? 'disabled style="opacity:0.3;"' : ''}><i class="fas fa-arrow-up"></i></button>
              <button class="icon-btn" onclick="window.moveTask(${task.id}, 'down')" title="Mover para baixo" ${viewAllMode || showingConcluido ? 'disabled style="opacity:0.3;"' : ''}><i class="fas fa-arrow-down"></i></button>
              <button class="icon-btn urgent-btn" onclick="window.toggleUrgent(${task.id})" title="Marcar/Desmarcar Urgente"><i class="fas fa-exclamation-triangle"></i></button>
              <button class="icon-btn rota-btn" onclick="window.toggleRotaEntrega(${task.id})" title="Marcar/Desmarcar Rota de Entrega"><i class="fas fa-truck"></i></button>
            ` : ''}
            <button class="icon-btn concluir-btn" onclick="window.marcarConcluido(${task.id})" title="Marcar como Concluído" ${task.concluido ? 'disabled style="opacity:0.3;"' : ''}><i class="fas fa-check-circle"></i></button>
            <button class="icon-btn" onclick="window.editTaskModal(${task.id})"><i class="fas fa-edit"></i></button>
            <button class="icon-btn" onclick="window.deleteTaskConfirm(${task.id})"><i class="fas fa-trash-alt"></i></button>
            <button class="icon-btn whatsapp-btn" onclick="window.sendWhatsAppById(${task.id})"><i class="fab fa-whatsapp"></i></button>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = html;
    
    document.querySelectorAll('.task-number').forEach(el => {
      el.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        const taskId = parseInt(this.dataset.taskId);
        const taskNome = this.dataset.taskNome;
        abrirModalPosicao(taskId, taskNome);
      });
    });
    
    if(!viewAllMode && !showingConcluido) attachCardDragEvents();
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function abrirModalPosicao(taskId, taskNome) {
    const task = tasks.find(t => t.id === taskId);
    if(task && !task.concluido && !viewAllMode && !showingConcluido && !showingReceita) {
      const weekTasks = tasks.filter(t => t.semana === task.semana && !t.concluido);
      document.getElementById("pedidoNome").innerHTML = taskNome;
      document.getElementById("maxPosicao").innerHTML = weekTasks.length;
      document.getElementById("posicaoEditId").value = taskId;
      document.getElementById("novaPosicao").value = "";
      document.getElementById("posicaoModal").style.display = "flex";
    } else if(task && task.concluido) {
      alert("Pedidos concluídos não podem ter posição alterada");
    } else if(viewAllMode || showingConcluido || showingReceita) {
      alert("Alterar posição disponível apenas na visualização por semana");
    }
  }

  window.moveTask = moveTask;
  window.cycleStatus = cycleStatus;
  window.toggleUrgent = toggleUrgent;
  window.toggleRotaEntrega = toggleRotaEntrega;
  window.togglePagamento = togglePagamento;
  window.marcarConcluido = marcarConcluido;
  window.sendWhatsAppById = (id) => { const t = tasks.find(t => t.id === id); if(t) sendWhatsApp(t); };
  window.deleteTaskConfirm = (id) => { if(confirm("Remover pedido permanentemente?")) deleteTask(id); };
  window.editTaskModal = (id) => {
    const task = tasks.find(t => t.id === id);
    if(task) openModalForEdit(task);
  };

  const modal = document.getElementById("taskModal");
  const posicaoModal = document.getElementById("posicaoModal");
  const openAddBtn = document.getElementById("openAddModalBtn");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const closePosicaoModalBtn = document.getElementById("closePosicaoModalBtn");
  const confirmarPosicaoBtn = document.getElementById("confirmarPosicaoBtn");
  const saveBtn = document.getElementById("saveTaskBtn");
  const modalTitle = document.getElementById("modalTitle");
  const editIdField = document.getElementById("editId");
  const nomeField = document.getElementById("nome");
  const telefoneField = document.getElementById("telefone");
  const descricaoField = document.getElementById("descricao");
  const dataEntregaField = document.getElementById("dataEntrega");
  const valorField = document.getElementById("valor");
  const statusSelect = document.getElementById("statusSelect");
  const pagamentoSelect = document.getElementById("pagamentoSelect");
  const urgenteCheckbox = document.getElementById("urgenteCheckbox");
  const rotaEntregaCheckbox = document.getElementById("rotaEntregaCheckbox");

  function openModalForEdit(task) {
    modalTitle.innerText = "Editar Pedido";
    editIdField.value = task.id;
    nomeField.value = task.nome;
    telefoneField.value = task.telefone || "";
    descricaoField.value = task.descricao;
    dataEntregaField.value = task.dataEntrega || "";
    valorField.value = task.valor;
    statusSelect.value = task.status;
    pagamentoSelect.value = task.pagamento || "aguardando";
    urgenteCheckbox.checked = task.urgente || false;
    rotaEntregaCheckbox.checked = task.rotaEntrega || false;
    modal.style.display = "flex";
  }

  function openModalForNew() {
    modalTitle.innerText = "Adicionar Pedido";
    editIdField.value = "";
    nomeField.value = "";
    telefoneField.value = "";
    descricaoField.value = "";
    dataEntregaField.value = "";
    valorField.value = "";
    statusSelect.value = "aguardando";
    pagamentoSelect.value = "aguardando";
    urgenteCheckbox.checked = false;
    rotaEntregaCheckbox.checked = false;
    modal.style.display = "flex";
  }

  function saveTaskFromModal() {
    const nome = nomeField.value.trim();
    if(!nome) { alert("Nome do cliente obrigatório"); return; }
    const telefone = telefoneField.value.trim();
    const descricao = descricaoField.value.trim();
    const dataEntrega = dataEntregaField.value;
    const valor = valorField.value.trim() || "0";
    const status = statusSelect.value;
    const pagamento = pagamentoSelect.value;
    const urgente = urgenteCheckbox.checked;
    const rotaEntrega = rotaEntregaCheckbox.checked;
    const editId = editIdField.value;
    if(editId) {
      const task = tasks.find(t => t.id == editId);
      if(task) {
        task.nome = nome;
        task.telefone = telefone;
        task.descricao = descricao;
        task.dataEntrega = dataEntrega;
        task.valor = valor;
        task.status = status;
        task.pagamento = pagamento;
        task.urgente = urgente;
        task.rotaEntrega = rotaEntrega;
        saveToLocal();
        renderTasks();
      }
    } else {
      const semanaParaAdicionar = (viewAllMode || showingConcluido) ? 1 : currentWeek;
      const newTask = {
        id: 0,
        semana: semanaParaAdicionar,
        nome: nome,
        telefone: telefone,
        descricao: descricao,
        dataEntrega: dataEntrega,
        valor: valor,
        status: status,
        pagamento: pagamento,
        urgente: urgente,
        rotaEntrega: rotaEntrega,
        concluido: false,
        ordem: tasks.filter(t => t.semana === semanaParaAdicionar && !t.concluido).length
      };
      addTask(newTask);
    }
    modal.style.display = "none";
  }

  openAddBtn.onclick = openModalForNew;
  closeModalBtn.onclick = () => modal.style.display = "none";
  closePosicaoModalBtn.onclick = () => posicaoModal.style.display = "none";
  confirmarPosicaoBtn.onclick = () => {
    const taskId = parseInt(document.getElementById("posicaoEditId").value);
    const novaPosicao = parseInt(document.getElementById("novaPosicao").value);
    if(taskId && novaPosicao) {
      ajustarPosicao(taskId, novaPosicao);
      posicaoModal.style.display = "none";
    } else {
      alert("Digite uma posição válida");
    }
  };
  saveBtn.onclick = saveTaskFromModal;
  window.onclick = (e) => { 
    if(e.target === modal) modal.style.display = "none";
    if(e.target === posicaoModal) posicaoModal.style.display = "none";
  };

  const viewAllBtn = document.getElementById("viewAllBtn");
  const concluidoTab = document.getElementById("concluidoTab");
  const receitaTab = document.getElementById("receitaTab");
  const tasksContainer = document.getElementById("tasksContainer");
  const receitaContainer = document.getElementById("receitaContainer");
  const actionsRow = document.getElementById("actionsRow");
  
  function setViewAllMode(enable) {
    viewAllMode = enable;
    showingConcluido = false;
    showingReceita = false;
    const tabs = document.querySelectorAll('.tab-btn');
    if(enable) {
      tabs.forEach(btn => btn.classList.remove('active'));
      concluidoTab.classList.remove('active');
      receitaTab.classList.remove('active');
      viewAllBtn.style.background = "var(--accent-hover)";
    } else {
      viewAllBtn.style.background = "var(--accent)";
      const activeTab = document.querySelector(`.tab-btn[data-week="${currentWeek}"]`);
      if(activeTab) activeTab.classList.add('active');
    }
    tasksContainer.style.display = "flex";
    receitaContainer.style.display = "none";
    actionsRow.style.display = "flex";
    renderTasks();
  }
  
  function setConcluidoMode(enable) {
    showingConcluido = enable;
    viewAllMode = false;
    showingReceita = false;
    const tabs = document.querySelectorAll('.tab-btn');
    if(enable) {
      tabs.forEach(btn => btn.classList.remove('active'));
      concluidoTab.classList.add('active');
      receitaTab.classList.remove('active');
      viewAllBtn.style.background = "var(--accent)";
    } else {
      concluidoTab.classList.remove('active');
    }
    tasksContainer.style.display = "flex";
    receitaContainer.style.display = "none";
    actionsRow.style.display = "flex";
    renderTasks();
  }
  
  function setReceitaMode(enable) {
    showingReceita = enable;
    viewAllMode = false;
    showingConcluido = false;
    const tabs = document.querySelectorAll('.tab-btn');
    if(enable) {
      tabs.forEach(btn => btn.classList.remove('active'));
      receitaTab.classList.add('active');
      concluidoTab.classList.remove('active');
      viewAllBtn.style.background = "var(--accent)";
      tasksContainer.style.display = "none";
      receitaContainer.style.display = "block";
      actionsRow.style.display = "none";
      renderReceita();
    } else {
      receitaTab.classList.remove('active');
      tasksContainer.style.display = "flex";
      receitaContainer.style.display = "none";
      actionsRow.style.display = "flex";
    }
  }
  
  document.querySelectorAll(".tab-btn[data-week]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      if(viewAllMode) setViewAllMode(false);
      if(showingConcluido) setConcluidoMode(false);
      if(showingReceita) setReceitaMode(false);
      document.querySelectorAll(".tab-btn[data-week]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentWeek = parseInt(btn.dataset.week);
      viewAllMode = false;
      showingConcluido = false;
      showingReceita = false;
      viewAllBtn.style.background = "var(--accent)";
      tasksContainer.style.display = "flex";
      receitaContainer.style.display = "none";
      actionsRow.style.display = "flex";
      renderTasks();
    });
  });
  
  concluidoTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingReceita) setReceitaMode(false);
    setConcluidoMode(true);
  });
  
  receitaTab.addEventListener("click", () => {
    if(viewAllMode) setViewAllMode(false);
    if(showingConcluido) setConcluidoMode(false);
    setReceitaMode(true);
  });
  
  viewAllBtn.addEventListener("click", () => {
    if(showingConcluido) setConcluidoMode(false);
    if(showingReceita) setReceitaMode(false);
    setViewAllMode(true);
  });

  const searchInput = document.getElementById("searchInput");
  searchInput.addEventListener("input", (e) => {
    searchQuery = e.target.value;
    if(!showingReceita) renderTasks();
  });

  const themeToggle = document.getElementById("themeToggle");
  const themeTextSpan = document.getElementById("themeText");
  function applyTheme(theme) {
    if(theme === 'dark') {
      document.body.classList.add('dark');
      localStorage.setItem('theme', 'dark');
      themeTextSpan.innerText = 'Claro';
      themeToggle.innerHTML = '<i class="fas fa-sun"></i> <span>Claro</span>';
    } else {
      document.body.classList.remove('dark');
      localStorage.setItem('theme', 'light');
      themeTextSpan.innerText = 'Escuro';
      themeToggle.innerHTML = '<i class="fas fa-moon"></i> <span>Escuro</span>';
    }
    if(showingReceita) renderReceita();
  }
  const savedTheme = localStorage.getItem('theme') || 'light';
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", () => {
    const isDark = document.body.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
  });

  loadData();
  renderTasks();
  setupDragAndDrop();
</script>
</body>
</html>
